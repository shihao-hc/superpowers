<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>技能输出预览 - UltraWork AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background: #0f0f23; 
      color: #e0e0e0; 
      height: 100vh;
      overflow: hidden;
    }
    
    .preview-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    
    .preview-header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .preview-title {
      font-size: 1.25rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    
    .preview-icon {
      width: 24px;
      height: 24px;
      background: #667eea;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }
    
    .preview-actions {
      display: flex;
      gap: 0.5rem;
    }
    
    .action-btn {
      background: transparent;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 0.5rem 1rem;
      color: #fff;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .action-btn:hover {
      background: #252540;
      border-color: #667eea;
    }
    
    .action-btn.primary {
      background: #667eea;
      border-color: #667eea;
    }
    
    .action-btn.primary:hover {
      background: #5a6fd6;
    }
    
    .preview-toolbar {
      background: #1a1a2e;
      padding: 0.75rem 1.5rem;
      border-bottom: 1px solid #333;
      display: flex;
      gap: 1rem;
      align-items: center;
    }
    
    .toolbar-group {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }
    
    .toolbar-label {
      font-size: 0.8rem;
      color: #888;
    }
    
    .format-selector {
      background: #0f0f23;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 0.5rem 1rem;
      color: #fff;
      font-size: 0.85rem;
      cursor: pointer;
    }
    
    .format-selector:focus {
      outline: none;
      border-color: #667eea;
    }
    
    .zoom-controls {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .zoom-btn {
      background: #0f0f23;
      border: 1px solid #333;
      border-radius: 4px;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #fff;
    }
    
    .zoom-btn:hover {
      background: #252540;
    }
    
    .zoom-value {
      font-size: 0.85rem;
      color: #888;
      min-width: 40px;
      text-align: center;
    }
    
    .preview-content {
      flex: 1;
      overflow: auto;
      background: #fff;
      position: relative;
    }
    
    .preview-frame {
      width: 100%;
      height: 100%;
      border: none;
    }
    
    .preview-image {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      margin: auto;
      display: block;
    }
    
    .preview-text {
      padding: 1.5rem;
      font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-all;
      background: #1e1e1e;
      color: #d4d4d4;
      height: 100%;
      overflow: auto;
    }
    
    .preview-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #666;
      gap: 1rem;
    }
    
    .placeholder-icon {
      width: 64px;
      height: 64px;
      background: #252540;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    
    .preview-status {
      background: #1a1a2e;
      padding: 0.5rem 1.5rem;
      border-top: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
      color: #888;
    }
    
    .status-info {
      display: flex;
      gap: 1.5rem;
    }
    
    .status-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
    }
    
    .status-dot.loading {
      background: #fbbf24;
      animation: pulse 1s infinite;
    }
    
    .status-dot.error {
      background: #f87171;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    /* Template Panel */
    .template-panel {
      width: 300px;
      background: #1a1a2e;
      border-left: 1px solid #333;
      display: flex;
      flex-direction: column;
      transition: width 0.3s;
    }
    
    .template-panel.collapsed {
      width: 0;
      overflow: hidden;
    }
    
    .template-header {
      padding: 1rem;
      border-bottom: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .template-title {
      font-weight: 600;
    }
    
    .template-search {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #333;
    }
    
    .search-input {
      width: 100%;
      background: #0f0f23;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 0.5rem 1rem;
      color: #fff;
      font-size: 0.85rem;
    }
    
    .search-input:focus {
      outline: none;
      border-color: #667eea;
    }
    
    .template-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem;
    }
    
    .template-item {
      background: #252540;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 0.5rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .template-item:hover {
      background: #2d2d50;
      border-color: #667eea;
    }
    
    .template-item.active {
      background: #3d3d60;
      border: 1px solid #667eea;
    }
    
    .template-name {
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    
    .template-desc {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 0.5rem;
    }
    
    .template-tags {
      display: flex;
      gap: 0.25rem;
      flex-wrap: wrap;
    }
    
    .template-tag {
      font-size: 0.7rem;
      padding: 0.15rem 0.4rem;
      background: #1a1a2e;
      border-radius: 4px;
      color: #aaa;
    }
    
    /* Export Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    
    .modal.active {
      display: flex;
    }
    
    .modal-content {
      background: #1a1a2e;
      border-radius: 12px;
      border: 1px solid #333;
      max-width: 500px;
      width: 90%;
    }
    
    .modal-header {
      padding: 1.25rem;
      border-bottom: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .modal-title {
      font-size: 1.25rem;
      font-weight: 600;
    }
    
    .modal-close {
      background: transparent;
      border: none;
      color: #888;
      font-size: 1.5rem;
      cursor: pointer;
    }
    
    .modal-body {
      padding: 1.25rem;
    }
    
    .form-group {
      margin-bottom: 1rem;
    }
    
    .form-label {
      display: block;
      margin-bottom: 0.5rem;
      color: #888;
      font-size: 0.9rem;
    }
    
    .form-input, .form-select {
      width: 100%;
      background: #0f0f23;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 0.75rem;
      color: #fff;
      font-size: 0.9rem;
    }
    
    .form-input:focus, .form-select:focus {
      outline: none;
      border-color: #667eea;
    }
    
    .modal-footer {
      padding: 1rem 1.25rem;
      background: rgba(0,0,0,0.2);
      display: flex;
      justify-content: flex-end;
      gap: 1rem;
    }
    
    /* Toast */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    
    .toast {
      background: #1a1a2e;
      border-radius: 8px;
      border: 1px solid #333;
      padding: 1rem 1.25rem;
      color: #fff;
      min-width: 300px;
      animation: slideIn 0.3s ease-out;
    }
    
    .toast.success { border-color: #4ade80; }
    .toast.error { border-color: #f87171; }
    .toast.warning { border-color: #fbbf24; }
    
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    
    .split-view {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    
    .main-preview {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div class="preview-container">
    <div class="split-view">
      <div class="main-preview">
        <div class="preview-header">
          <div class="preview-title">
            <div class="preview-icon">👁</div>
            <span id="previewFileName">选择文件进行预览</span>
          </div>
          <div class="preview-actions">
            <button class="action-btn" id="templateToggleBtn">
              📋 模板库
            </button>
            <button class="action-btn" id="exportBtn">
              📤 导出
            </button>
            <button class="action-btn" id="downloadBtn">
              ⬇️ 下载
            </button>
            <button class="action-btn" id="refreshBtn">
              🔄 刷新
            </button>
          </div>
        </div>
        
        <div class="preview-toolbar">
          <div class="toolbar-group">
            <span class="toolbar-label">格式:</span>
            <select class="format-selector" id="formatSelector">
              <option value="auto">自动检测</option>
              <option value="html">HTML</option>
              <option value="image">图片</option>
              <option value="text">文本</option>
              <option value="markdown">Markdown</option>
              <option value="pdf">PDF</option>
            </select>
          </div>
          
          <div class="toolbar-group zoom-controls">
            <button class="zoom-btn" id="zoomOutBtn">-</button>
            <span class="zoom-value" id="zoomValue">100%</span>
            <button class="zoom-btn" id="zoomInBtn">+</button>
            <button class="zoom-btn" id="zoomResetBtn">↺</button>
          </div>
          
          <div class="toolbar-group">
            <button class="action-btn" id="fullscreenBtn">
              ⛶ 全屏
            </button>
          </div>
        </div>
        
        <div class="preview-content" id="previewContent">
          <div class="preview-placeholder">
            <div class="placeholder-icon">📄</div>
            <div>拖放文件到此处或点击"打开文件"进行预览</div>
            <div style="font-size: 0.85rem; color: #888;">
              支持 HTML、图片、Markdown、文本、PDF 等格式
            </div>
          </div>
        </div>
        
        <div class="preview-status">
          <div class="status-info">
            <div class="status-item">
              <div class="status-dot" id="statusDot"></div>
              <span id="statusText">就绪</span>
            </div>
            <div class="status-item" id="fileSizeInfo" style="display: none;">
              大小: <span id="fileSize">0 KB</span>
            </div>
            <div class="status-item" id="fileTypeInfo" style="display: none;">
              类型: <span id="fileType">-</span>
            </div>
          </div>
          <div>
            <span id="previewTime">-</span>
          </div>
        </div>
      </div>
      
      <div class="template-panel" id="templatePanel">
        <div class="template-header">
          <div class="template-title">模板库</div>
          <button class="action-btn" id="closeTemplatePanel">×</button>
        </div>
        
        <div class="template-search">
          <input type="text" class="search-input" id="templateSearch" placeholder="搜索模板...">
        </div>
        
        <div class="template-list" id="templateList">
          <!-- Templates will be loaded here -->
        </div>
      </div>
    </div>
  </div>
  
  <!-- Export Modal -->
  <div class="modal" id="exportModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">导出到云存储</h3>
        <button class="modal-close" id="closeExportModal">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">导出格式</label>
          <select class="form-select" id="exportFormat">
            <option value="json">JSON</option>
            <option value="csv">CSV</option>
            <option value="markdown">Markdown</option>
            <option value="html">HTML</option>
            <option value="pdf">PDF</option>
          </select>
        </div>
        
        <div class="form-group">
          <label class="form-label">文件名</label>
          <input type="text" class="form-input" id="exportFilename" placeholder="export_2024">
        </div>
        
        <div class="form-group">
          <label class="form-label">描述（可选）</label>
          <input type="text" class="form-input" id="exportDescription" placeholder="添加描述...">
        </div>
        
        <div id="exportResult" style="display: none; margin-top: 1rem;">
          <div style="background: #252540; border-radius: 8px; padding: 1rem;">
            <div style="color: #4ade80; margin-bottom: 0.5rem;">✓ 导出成功</div>
            <div style="font-size: 0.85rem; color: #888; word-break: break-all;">
              永久链接: <span id="exportUrl">-</span>
            </div>
            <button class="action-btn" id="copyExportUrl" style="margin-top: 0.5rem;">
              📋 复制链接
            </button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="action-btn" id="cancelExportBtn">取消</button>
        <button class="action-btn primary" id="confirmExportBtn">导出</button>
      </div>
    </div>
  </div>
  
  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>
  
  <script>
    class PreviewPanel {
      constructor() {
        this.currentFile = null;
        this.currentPreview = null;
        this.zoom = 100;
        this.templatePanelVisible = false;
        this.templates = [];
        
        this.init();
      }
      
      async init() {
        this.bindEvents();
        await this.loadTemplates();
      }
      
      bindEvents() {
        // Template panel toggle
        document.getElementById('templateToggleBtn').addEventListener('click', () => {
          this.toggleTemplatePanel();
        });
        
        document.getElementById('closeTemplatePanel').addEventListener('click', () => {
          this.toggleTemplatePanel(false);
        });
        
        // Export
        document.getElementById('exportBtn').addEventListener('click', () => {
          this.openExportModal();
        });
        
        document.getElementById('closeExportModal').addEventListener('click', () => {
          this.closeModal('exportModal');
        });
        
        document.getElementById('cancelExportBtn').addEventListener('click', () => {
          this.closeModal('exportModal');
        });
        
        document.getElementById('confirmExportBtn').addEventListener('click', () => {
          this.exportData();
        });
        
        // Download
        document.getElementById('downloadBtn').addEventListener('click', () => {
          this.downloadFile();
        });
        
        // Refresh
        document.getElementById('refreshBtn').addEventListener('click', () => {
          this.refreshPreview();
        });
        
        // Zoom controls
        document.getElementById('zoomInBtn').addEventListener('click', () => {
          this.setZoom(this.zoom + 10);
        });
        
        document.getElementById('zoomOutBtn').addEventListener('click', () => {
          this.setZoom(this.zoom - 10);
        });
        
        document.getElementById('zoomResetBtn').addEventListener('click', () => {
          this.setZoom(100);
        });
        
        // Fullscreen
        document.getElementById('fullscreenBtn').addEventListener('click', () => {
          this.toggleFullscreen();
        });
        
        // Template search
        document.getElementById('templateSearch').addEventListener('input', (e) => {
          this.filterTemplates(e.target.value);
        });
        
        // Copy export URL
        document.getElementById('copyExportUrl').addEventListener('click', () => {
          this.copyToClipboard(document.getElementById('exportUrl').textContent);
        });
        
        // Drag and drop
        const previewContent = document.getElementById('previewContent');
        previewContent.addEventListener('dragover', (e) => {
          e.preventDefault();
          previewContent.style.background = '#252540';
        });
        
        previewContent.addEventListener('dragleave', () => {
          previewContent.style.background = '#fff';
        });
        
        previewContent.addEventListener('drop', (e) => {
          e.preventDefault();
          previewContent.style.background = '#fff';
          
          const files = e.dataTransfer.files;
          if (files.length > 0) {
            this.loadFile(files[0]);
          }
        });
      }
      
      async loadTemplates() {
        try {
          const response = await fetch('/api/skills/templates');
          const data = await response.json();
          this.templates = data.templates || [];
          this.renderTemplates();
        } catch (error) {
          console.error('Failed to load templates:', error);
        }
      }
      
      renderTemplates(filter = '') {
        const list = document.getElementById('templateList');
        const filtered = filter 
          ? this.templates.filter(t => 
              t.name.toLowerCase().includes(filter.toLowerCase()) ||
              t.description.toLowerCase().includes(filter.toLowerCase()) ||
              t.tags.some(tag => tag.toLowerCase().includes(filter.toLowerCase()))
            )
          : this.templates;
        
        list.innerHTML = filtered.map(template => `
          <div class="template-item" data-template="${template.id}">
            <div class="template-name">${template.name}</div>
            <div class="template-desc">${template.description}</div>
            <div class="template-tags">
              ${template.tags.map(tag => `<span class="template-tag">${tag}</span>`).join('')}
            </div>
          </div>
        `).join('');
        
        // Add click handlers
        list.querySelectorAll('.template-item').forEach(item => {
          item.addEventListener('click', () => {
            this.useTemplate(item.dataset.template);
          });
        });
      }
      
      filterTemplates(query) {
        this.renderTemplates(query);
      }
      
      async useTemplate(templateId) {
        try {
          const response = await fetch(`/api/skills/templates/${templateId}`);
          const data = await response.json();
          
          if (data.template) {
            // Create preview from template
            const previewData = {
              content: data.template.template,
              filename: `${data.template.name}.md`,
              title: data.template.name
            };
            
            await this.createPreview(previewData);
            this.showToast(`已加载模板: ${data.template.name}`, 'success');
          }
        } catch (error) {
          this.showToast('加载模板失败: ' + error.message, 'error');
        }
      }
      
      toggleTemplatePanel(show = null) {
        const panel = document.getElementById('templatePanel');
        this.templatePanelVisible = show !== null ? show : !this.templatePanelVisible;
        panel.classList.toggle('collapsed', !this.templatePanelVisible);
      }
      
      async loadFile(file) {
        this.currentFile = file;
        this.setStatus('loading', '正在加载...');
        
        const formData = new FormData();
        formData.append('file', file);
        
        try {
          const response = await fetch('/api/skills/preview/create', {
            method: 'POST',
            body: formData
          });
          
          const result = await response.json();
          
          if (result.ok) {
            this.currentPreview = result.preview;
            this.displayPreview(result.preview);
            this.updateFileInfo(file);
            this.setStatus('ready', '预览就绪');
          } else {
            throw new Error(result.error);
          }
        } catch (error) {
          this.setStatus('error', '加载失败');
          this.showToast('加载文件失败: ' + error.message, 'error');
        }
      }
      
      async createPreview(data) {
        this.setStatus('loading', '正在创建预览...');
        
        try {
          const response = await fetch('/api/skills/preview/create', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
          });
          
          const result = await response.json();
          
          if (result.ok) {
            this.currentPreview = result.preview;
            this.displayPreview(result.preview);
            document.getElementById('previewFileName').textContent = data.filename;
            this.setStatus('ready', '预览就绪');
          } else {
            throw new Error(result.error);
          }
        } catch (error) {
          this.setStatus('error', '创建预览失败');
          this.showToast('创建预览失败: ' + error.message, 'error');
        }
      }
      
      displayPreview(preview) {
        const content = document.getElementById('previewContent');
        const startTime = Date.now();
        
        // Clear content
        content.innerHTML = '';
        
        // Create iframe for HTML/Markdown
        if (preview.type === 'html' || preview.type === 'markdown') {
          const iframe = document.createElement('iframe');
          iframe.className = 'preview-frame';
          iframe.src = `/api/skills/preview/${preview.id}`;
          content.appendChild(iframe);
        } 
        // Create image element
        else if (preview.type === 'image') {
          const img = document.createElement('img');
          img.className = 'preview-image';
          img.src = `/api/skills/preview/${preview.id}`;
          content.appendChild(img);
        }
        // Create PDF viewer
        else if (preview.type === 'pdf') {
          const iframe = document.createElement('iframe');
          iframe.className = 'preview-frame';
          iframe.src = `/api/skills/preview/${preview.id}/viewer`;
          content.appendChild(iframe);
        }
        // Text/code preview
        else {
          const pre = document.createElement('pre');
          pre.className = 'preview-text';
          pre.textContent = preview.content || '无法显示预览';
          content.appendChild(pre);
        }
        
        // Update status
        const duration = Date.now() - startTime;
        document.getElementById('previewTime').textContent = `加载时间: ${duration}ms`;
      }
      
      updateFileInfo(file) {
        document.getElementById('previewFileName').textContent = file.name;
        document.getElementById('fileSize').textContent = this.formatSize(file.size);
        document.getElementById('fileType').textContent = file.type || '未知';
        
        document.getElementById('fileSizeInfo').style.display = 'flex';
        document.getElementById('fileTypeInfo').style.display = 'flex';
      }
      
      formatSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
      }
      
      setStatus(type, text) {
        const dot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        
        dot.className = 'status-dot';
        if (type === 'loading') dot.classList.add('loading');
        if (type === 'error') dot.classList.add('error');
        
        statusText.textContent = text;
      }
      
      setZoom(value) {
        this.zoom = Math.max(25, Math.min(200, value));
        document.getElementById('zoomValue').textContent = this.zoom + '%';
        
        const content = document.getElementById('previewContent');
        content.style.transform = `scale(${this.zoom / 100})`;
        content.style.transformOrigin = 'top left';
      }
      
      toggleFullscreen() {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen();
        } else {
          document.exitFullscreen();
        }
      }
      
      refreshPreview() {
        if (this.currentPreview) {
          this.displayPreview(this.currentPreview);
        }
      }
      
      downloadFile() {
        if (this.currentPreview) {
          const url = `/api/skills/preview/${this.currentPreview.id}`;
          const a = document.createElement('a');
          a.href = url;
          a.download = document.getElementById('previewFileName').textContent;
          a.click();
        }
      }
      
      async openExportModal() {
        document.getElementById('exportResult').style.display = 'none';
        document.getElementById('exportFilename').value = '';
        document.getElementById('exportDescription').value = '';
        this.openModal('exportModal');
      }
      
      async exportData() {
        const format = document.getElementById('exportFormat').value;
        const filename = document.getElementById('exportFilename').value || `export_${Date.now()}`;
        
        if (!this.currentPreview) {
          this.showToast('请先加载要导出的内容', 'warning');
          return;
        }
        
        try {
          // Get preview content
          const response = await fetch(`/api/skills/preview/${this.currentPreview.id}`);
          const content = await response.text();
          
          // Export to cloud storage
          const exportResponse = await fetch('/api/skills/export', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              data: { content, filename: document.getElementById('previewFileName').textContent },
              format,
              filename: `${filename}.${format === 'markdown' ? 'md' : format}`,
              metadata: {
                description: document.getElementById('exportDescription').value
              }
            })
          });
          
          const result = await exportResponse.json();
          
          if (result.ok) {
            document.getElementById('exportUrl').textContent = result.permanentUrl;
            document.getElementById('exportResult').style.display = 'block';
            this.showToast('导出成功', 'success');
          } else {
            throw new Error(result.error);
          }
        } catch (error) {
          this.showToast('导出失败: ' + error.message, 'error');
        }
      }
      
      copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
          this.showToast('链接已复制', 'success');
        });
      }
      
      openModal(modalId) {
        document.getElementById(modalId).classList.add('active');
      }
      
      closeModal(modalId) {
        document.getElementById(modalId).classList.remove('active');
      }
      
      showToast(message, type = 'success') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.textContent = message;
        container.appendChild(toast);
        
        setTimeout(() => {
          toast.remove();
        }, 3000);
      }
    }
    
    // Initialize preview panel
    const previewPanel = new PreviewPanel();
  </script>
</body>
</html>
