<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>UltraWork AI - 游戏面板</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 20px; background: #1a1a2e; color: #eee; }
    .panel { background: #16213e; border-radius: 12px; padding: 20px; max-width: 800px; margin: 0 auto; }
    h2 { margin-top: 0; color: #e94560; }
    .status { display: flex; gap: 20px; flex-wrap: wrap; margin: 15px 0; }
    .status-item { background: #0f3460; padding: 12px 20px; border-radius: 8px; }
    .status-item .label { font-size: 12px; color: #888; }
    .status-item .value { font-size: 18px; font-weight: bold; }
    .status-item.connected { border-left: 4px solid #4CAF50; }
    .status-item.disconnected { border-left: 4px solid #f44336; }
    .events { background: #0f3460; border-radius: 8px; padding: 15px; max-height: 200px; overflow-y: auto; }
    .event { padding: 5px 0; border-bottom: 1px solid #16213e; font-size: 13px; }
    .event:last-child { border-bottom: none; }
    .event .time { color: #888; font-size: 11px; }
    .event.hurt { color: #ff9800; }
    .event.died { color: #f44336; }
    .event.chat { color: #4CAF50; }
    .event.join { color: #2196F3; }
    .commands { margin-top: 20px; }
    .commands input { width: 70%; padding: 10px; border: none; border-radius: 6px; background: #0f3460; color: #fff; }
    .commands button { padding: 10px 20px; background: #e94560; color: white; border: none; border-radius: 6px; cursor: pointer; }
    .commands button:hover { background: #d63850; }
    .log { background: #000; padding: 10px; border-radius: 6px; font-family: monospace; font-size: 12px; max-height: 150px; overflow-y: auto; margin-top: 15px; }
    .log-entry { color: #4CAF50; }
    .log-entry.error { color: #f44336; }
    .log-entry.info { color: #2196F3; }
  </style>
</head>
<body>
  <div class="panel">
    <h2>🎮 游戏状态面板</h2>
    
    <div class="status" id="status">
      <div class="status-item disconnected" id="status-connected">
        <div class="label">连接状态</div>
        <div class="value" id="connected-value">未连接</div>
      </div>
      <div class="status-item">
        <div class="label">机器人</div>
        <div class="value" id="bot-name">-</div>
      </div>
      <div class="status-item">
        <div class="label">血量</div>
        <div class="value" id="health">-</div>
      </div>
      <div class="status-item">
        <div class="label">饱食度</div>
        <div class="value" id="food">-</div>
      </div>
      <div class="status-item">
        <div class="label">位置</div>
        <div class="value" id="position">-</div>
      </div>
    </div>

    <h3>📋 最近事件</h3>
    <div class="events" id="events">
      <div class="event">等待事件...</div>
    </div>

    <div class="commands">
      <h3>⌨️ 命令</h3>
      <input type="text" id="command" placeholder="输入命令 (如: /status, /goto 100 64 0)" />
      <button onclick="sendCommand()">发送</button>
    </div>

    <div class="log" id="log">
      <div class="log-entry info">[系统] 面板已加载</div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js" 
          integrity="sha384-5nevKDVkYFKQjdHnihgH0C+g8uJq2JmLDM0M4eR3wZGtG1XiVQy2Zd3T7M2E" 
          crossorigin="anonymous" 
          referrerpolicy="no-referrer"></script>
  <script>
    let socket = null;
    let eventCount = 0;

    function connect() {
      socket = io();

      socket.on('connect', () => {
        log('已连接 Socket.IO: ' + socket.id, 'info');
        socket.emit('game_status');
        socket.emit('events');
      });

      socket.on('disconnect', () => {
        log('Socket.IO 断开，3秒后重连...', 'error');
        setTimeout(connect, 3000);
      });

      socket.on('game_status', (data) => {
        updateStatus(data);
      });

      socket.on('status_update', (data) => {
        updateStatus(data.status);
      });

      socket.on('game_event', (data) => {
        addEvent(data.data || data.event);
      });

      socket.on('mood_change', (data) => {
        log(`心情变化: ${data.mood}`, 'info');
      });

      socket.on('chat', (data) => {
        addEvent({ type: 'chat', from: data.sender, message: data.message });
        log(`${data.sender}: ${data.message}`, 'info');
      });

      socket.on('command_result', (data) => {
        try {
          const safeResult = JSON.stringify(data.result || {}).replace(/[<>]/g, '');
          log(`命令结果: ${safeResult}`);
        } catch (e) {
          log('命令结果: (无法显示)');
        }
      });

      socket.on('error', (data) => {
        log(`错误: ${data.message}`, 'error');
      });

      socket.on('connect_error', (err) => {
        log('连接错误: ' + err.message, 'error');
      });
    }

    function handleMessage(data) {
      // 已迁移到 Socket.IO 事件监听器
      // 此函数保留以兼容旧代码
    }

    function updateStatus(status) {
      const container = document.getElementById('status-connected');
      const connected = status?.connected;
      
      document.getElementById('connected-value').textContent = connected ? '✅ 已连接' : '❌ 未连接';
      container.className = 'status-item ' + (connected ? 'connected' : 'disconnected');
      document.getElementById('bot-name').textContent = status?.bot?.username || '-';
      document.getElementById('health').textContent = status?.bot?.health ? `${status.bot.health}/20` : '-';
      document.getElementById('food').textContent = status?.bot?.food || '-';
      
      const pos = status?.bot?.position;
      document.getElementById('position').textContent = pos ? `${pos.x}, ${pos.y}, ${pos.z}` : '-';
    }

    function addEvent(event) {
      if (!event) return;
      
      const container = document.getElementById('events');
      const eventDiv = document.createElement('div');
      const time = new Date().toLocaleTimeString();
      const typeClass = event.type?.toLowerCase() || '';
      
      let text = '';
      switch (event.type) {
        case 'hurt': text = `💥 受伤! 血量: ${event.data?.health}`; break;
        case 'died': text = '💀 死亡!'; break;
        case 'chat': text = `💬 ${event.data?.from}: ${event.data?.message}`; break;
        case 'playerJoined': text = `👤 ${event.data?.player} 加入了游戏`; break;
        case 'playerLeft': text = `👋 ${event.data?.player} 离开了游戏`; break;
        case 'whisper': text = `📩 私聊: ${event.data?.from}: ${event.data?.message}`; break;
        default: text = JSON.stringify(event);
      }
      
      eventDiv.className = `event ${typeClass}`;
      const timeSpan = document.createElement('span');
      timeSpan.className = 'time';
      timeSpan.textContent = time;
      eventDiv.appendChild(timeSpan);
      eventDiv.appendChild(document.createTextNode(' ' + text));
      
      container.insertBefore(eventDiv, container.firstChild);
      
      eventCount++;
      if (eventCount > 50) {
        container.removeChild(container.lastChild);
      }
    }

    function sendCommand() {
      const input = document.getElementById('command');
      const cmd = input.value.trim();
      if (!cmd) return;
      
      if (socket && socket.connected) {
        socket.emit('game_command', { command: cmd });
        log(`发送命令: ${cmd}`, 'info');
      } else {
        log('Socket.IO 未连接', 'error');
      }
      
      input.value = '';
    }

    function log(message, type = '') {
      const container = document.getElementById('log');
      const entry = document.createElement('div');
      const time = new Date().toLocaleTimeString();
      entry.className = 'log-entry ' + type;
      entry.textContent = `[${time}] ${message}`;
      container.appendChild(entry);
      container.scrollTop = container.scrollHeight;
      
      if (container.children.length > 100) {
        container.removeChild(container.firstChild);
      }
    }

    document.getElementById('command').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendCommand();
    });

    connect();
  </script>
</body>
</html>
