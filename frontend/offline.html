<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>UltraWork AI - 离线模式</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .container {
        background: rgba(255,255,255,0.95);
        border-radius: 20px;
        padding: 40px;
        max-width: 450px;
        text-align: center;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      }
      .icon { font-size: 64px; margin-bottom: 20px; }
      h1 {
        color: #333;
        font-size: 24px;
        margin-bottom: 15px;
      }
      p {
        color: #666;
        line-height: 1.6;
        margin-bottom: 25px;
      }
      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 20px;
        background: #fff3e0;
        border-radius: 20px;
        color: #e65100;
        font-size: 14px;
      }
      .status-dot {
        width: 10px;
        height: 10px;
        background: #ff9800;
        border-radius: 50%;
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      .retry-btn {
        margin-top: 25px;
        padding: 12px 30px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 25px;
        font-size: 16px;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
      }
      .retry-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 30px rgba(102,126,234,0.4);
      }
      .cached-info {
        margin-top: 20px;
        font-size: 12px;
        color: #999;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">📡</div>
      <h1>已切换到离线模式</h1>
      <p>当前网络不可用。应用将使用缓存内容进行展示，但部分功能可能暂时不可用。</p>
      <div class="status">
        <span class="status-dot"></span>
        <span>等待网络恢复...</span>
      </div>
      <button class="retry-btn" onclick="window.location.reload()">
        重新连接
      </button>
      <div class="cached-info">
        已缓存核心功能 | 版本 2.0.0
      </div>
    </div>
    <script>
      if (navigator.onLine) {
        window.location.reload();
      }
      window.addEventListener('online', () => window.location.reload());
    </script>
  </body>
</html>
