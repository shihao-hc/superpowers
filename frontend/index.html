<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UltraWork AI - AI虚拟角色平台</title>
  <link rel="manifest" href="/frontend/manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #7c3aed;
      --primary-light: #a78bfa;
      --secondary: #06b6d4;
      --accent: #f472b6;
      --bg-dark: #0f0f1a;
      --bg-card: rgba(255, 255, 255, 0.08);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.7);
      --glass-bg: rgba(255, 255, 255, 0.1);
      --glass-border: rgba(255, 255, 255, 0.18);
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-dark);
      min-height: 100vh;
      color: var(--text-primary);
      overflow-x: hidden;
    }

    /* Animated Background */
    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
    }

    .bg-animation::before {
      content: '';
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background: 
        radial-gradient(circle at 20% 80%, rgba(124, 58, 237, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(6, 182, 212, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 40% 40%, rgba(244, 114, 182, 0.2) 0%, transparent 40%);
      animation: bgMove 20s ease-in-out infinite;
    }

    @keyframes bgMove {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      50% { transform: translate(-5%, -5%) rotate(5deg); }
    }

    /* Floating Particles */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      animation: float 15s infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
    }

    /* Main Layout */
    .app-container {
      display: grid;
      grid-template-columns: 320px 1fr 350px;
      grid-template-rows: auto 1fr;
      gap: 20px;
      max-width: 1600px;
      margin: 0 auto;
      padding: 20px;
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    /* Header */
    .header {
      grid-column: 1 / -1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 25px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      border: 1px solid var(--glass-border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 45px;
      height: 45px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .logo-text h1 {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, var(--primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo-text span {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(34, 197, 94, 0.2);
      border-radius: 20px;
      font-size: 13px;
      color: #22c55e;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.2); }
    }

    /* Avatar Panel */
    .avatar-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      border: 1px solid var(--glass-border);
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    .avatar-container {
      width: 100%;
      aspect-ratio: 3/4;
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(124, 58, 237, 0.3) 0%, rgba(6, 182, 212, 0.2) 100%);
    }

    #live2d-canvas {
      width: 100%;
      height: 100%;
    }

    .avatar-info {
      width: 100%;
      margin-top: 15px;
      text-align: center;
    }

    .avatar-name {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .avatar-mood {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--text-secondary);
      font-size: 14px;
    }

    .mood-emoji {
      font-size: 24px;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    /* Voice Controls */
    .voice-controls {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      width: 100%;
    }

    .voice-btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      font-size: 20px;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .voice-btn.primary {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
    }

    .voice-btn.secondary {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: var(--text-primary);
    }

    .voice-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(124, 58, 237, 0.3);
    }

    .voice-btn.active {
      background: linear-gradient(135deg, #ef4444, #f97316);
      animation: recording 1s infinite;
    }

    @keyframes recording {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
      50% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
    }

    /* Chat Panel */
    .chat-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      border: 1px solid var(--glass-border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      padding: 20px;
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chat-title {
      font-size: 18px;
      font-weight: 600;
    }

    .chat-actions {
      display: flex;
      gap: 10px;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 10px;
      background: var(--glass-bg);
      color: var(--text-primary);
      cursor: pointer;
      font-size: 16px;
      transition: all 0.2s;
    }

    .icon-btn:hover {
      background: var(--primary);
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .message {
      max-width: 80%;
      padding: 14px 18px;
      border-radius: 18px;
      animation: messageIn 0.3s ease;
      line-height: 1.6;
    }

    @keyframes messageIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message.ai {
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .message-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 12px;
      opacity: 0.7;
    }

    .message-avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 14px 18px;
      background: var(--bg-card);
      border-radius: 18px;
      width: fit-content;
    }

    .typing-indicator span {
      width: 8px;
      height: 8px;
      background: var(--text-secondary);
      border-radius: 50%;
      animation: typing 1.4s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .chat-input-area {
      padding: 20px;
      border-top: 1px solid var(--glass-border);
      display: flex;
      gap: 12px;
    }

    .chat-input {
      flex: 1;
      padding: 14px 20px;
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      border-radius: 25px;
      color: var(--text-primary);
      font-size: 15px;
      outline: none;
      transition: all 0.3s;
    }

    .chat-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.2);
    }

    .chat-input::placeholder {
      color: var(--text-secondary);
    }

    .send-btn {
      width: 50px;
      height: 50px;
      border: none;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      cursor: pointer;
      font-size: 20px;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .send-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 5px 20px rgba(124, 58, 237, 0.4);
    }

    /* Control Panel */
    .control-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      border: 1px solid var(--glass-border);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
    }

    .panel-section {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 18px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Personality Cards */
    .personality-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .personality-card {
      padding: 12px;
      background: var(--glass-bg);
      border: 2px solid transparent;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
    }

    .personality-card:hover {
      border-color: var(--primary);
      transform: translateY(-2px);
    }

    .personality-card.active {
      border-color: var(--primary);
      background: rgba(124, 58, 237, 0.2);
    }

    .personality-icon {
      font-size: 28px;
      margin-bottom: 6px;
    }

    .personality-name {
      font-size: 13px;
      font-weight: 500;
    }

    /* Voice Settings */
    .voice-settings {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .setting-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .setting-label {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .toggle-switch {
      width: 48px;
      height: 26px;
      background: var(--glass-bg);
      border-radius: 13px;
      position: relative;
      cursor: pointer;
      transition: all 0.3s;
    }

    .toggle-switch.active {
      background: var(--primary);
    }

    .toggle-switch::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      background: white;
      border-radius: 50%;
      top: 3px;
      left: 3px;
      transition: all 0.3s;
    }

    .toggle-switch.active::after {
      left: 25px;
    }

    /* Game Panel */
    .game-panel {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .game-btn {
      padding: 14px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      color: var(--text-primary);
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s;
    }

    .game-btn:hover {
      background: var(--primary);
      border-color: var(--primary);
    }

    .game-btn.active {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border-color: transparent;
    }

    .game-icon {
      font-size: 20px;
    }

    /* Memory Stats */
    .memory-stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .stat-item {
      text-align: center;
      padding: 12px;
      background: var(--glass-bg);
      border-radius: 10px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--primary-light);
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* Emotion Bar */
    .emotion-bar {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }

    .emotion-dot {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      cursor: pointer;
      background: var(--glass-bg);
      transition: all 0.2s;
    }

    .emotion-dot:hover {
      transform: scale(1.2);
    }

    .emotion-dot.active {
      background: var(--primary);
      box-shadow: 0 0 15px var(--primary);
    }

    /* Responsive */
    @media (max-width: 1200px) {
      .app-container {
        grid-template-columns: 280px 1fr;
      }
      .control-panel {
        grid-column: 1 / -1;
        flex-direction: row;
        flex-wrap: wrap;
      }
      .panel-section {
        flex: 1;
        min-width: 200px;
      }
    }

    /* Emotion Canvas */
    #emotion-canvas {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(124,58,237,0.2) 0%, transparent 70%);
      box-shadow: 0 0 40px rgba(124, 58, 237, 0.3);
    }

    .avatar-container {
      position: relative;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      overflow: hidden;
    }

    .voice-btn.speaking {
      animation: pulse 1s infinite;
      background: linear-gradient(135deg, var(--accent), var(--primary));
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @media (max-width: 768px) {
      .app-container {
        grid-template-columns: 1fr;
      }
      .avatar-panel {
        max-height: 400px;
      }
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--glass-border);
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <!-- Background Animation -->
  <div class="bg-animation"></div>
  <div class="particles" id="particles"></div>

  <div class="app-container">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <div class="logo-icon">✨</div>
        <div class="logo-text">
          <h1>UltraWork AI</h1>
          <span>AI 虚拟角色平台</span>
        </div>
      </div>
      <div class="header-actions">
        <div class="status-badge">
          <span class="status-dot"></span>
          <span>在线</span>
        </div>
        <button class="icon-btn" onclick="toggleSettings()">⚙️</button>
      </div>
    </header>

    <!-- Avatar Panel -->
    <aside class="avatar-panel">
      <div class="avatar-container">
        <canvas id="emotion-canvas" width="200" height="200" style="border-radius:50%;"></canvas>
        <div id="live2d-canvas"></div>
      </div>
      <div class="avatar-info">
        <div class="avatar-name" id="avatar-name">狐九</div>
        <div class="avatar-mood">
          <span class="mood-emoji" id="mood-emoji">😊</span>
          <span class="mood-text" id="mood-text">开心</span>
        </div>
      </div>
      <div class="voice-controls">
        <button class="voice-btn primary" id="mic-btn" onclick="toggleVoice()">
          🎤 语音
        </button>
        <button class="voice-btn secondary" onclick="stopSpeaking()">
          ⏹️
        </button>
      </div>
      <div class="emotion-bar">
        <div class="emotion-dot active" data-mood="happy" onclick="setMood('happy')">😊</div>
        <div class="emotion-dot" data-mood="excited" onclick="setMood('excited')">🤩</div>
        <div class="emotion-dot" data-mood="curious" onclick="setMood('curious')">🤔</div>
        <div class="emotion-dot" data-mood="shy" onclick="setMood('shy')">😳</div>
        <div class="emotion-dot" data-mood="sleepy" onclick="setMood('sleepy')">😴</div>
      </div>
    </aside>

    <!-- Chat Panel -->
    <main class="chat-panel">
      <div class="chat-header">
        <span class="chat-title">💬 对话</span>
        <div class="chat-actions">
          <button class="icon-btn" onclick="clearChat()">🗑️</button>
          <button class="icon-btn" onclick="exportChat()">📤</button>
        </div>
      </div>
      <div class="chat-messages" id="chat-messages">
        <div class="message ai">
          <div class="message-header">
            <div class="message-avatar">🦊</div>
            <span>狐九</span>
          </div>
          <div>主人你好呀~我是狐九！今天想聊点什么呀？(◕‿◕)✨</div>
        </div>
      </div>
      <div class="chat-input-area">
        <input type="text" class="chat-input" id="chat-input" placeholder="输入消息..." onkeypress="handleKeyPress(event)">
        <button class="send-btn" onclick="sendMessage()">➤</button>
      </div>
    </main>

    <!-- Control Panel -->
    <aside class="control-panel">
      <!-- Personality Section -->
      <div class="panel-section">
        <div class="section-header">
          <span class="section-title">🎭 人格</span>
        </div>
        <div class="personality-grid" id="personality-grid">
          <!-- Generated by JS -->
        </div>
      </div>

      <!-- Voice Settings -->
      <div class="panel-section">
        <div class="section-header">
          <span class="section-title">🔊 语音设置</span>
        </div>
        <div class="voice-settings">
          <div class="setting-item">
            <span class="setting-label">语音合成</span>
            <div class="toggle-switch active" id="tts-toggle" onclick="toggleTTS()"></div>
          </div>
          <div class="setting-item">
            <span class="setting-label">自动朗读</span>
            <div class="toggle-switch" id="auto-tts-toggle" onclick="toggleAutoTTS()"></div>
          </div>
          <div class="setting-item">
            <span class="setting-label">语音识别</span>
            <div class="toggle-switch active" id="stt-toggle" onclick="toggleSTT()"></div>
          </div>
        </div>
      </div>

      <!-- Game Panel -->
      <div class="panel-section">
        <div class="section-header">
          <span class="section-title">🎮 游戏互动</span>
        </div>
        <div class="game-panel">
          <button class="game-btn" id="game-btn" onclick="toggleGameMode()">
            <span class="game-icon">📺</span>
            <span>开始游戏解说</span>
          </button>
          <button class="game-btn" onclick="triggerGameEvent('battle')">
            <span class="game-icon">⚔️</span>
            <span>模拟战斗</span>
          </button>
          <button class="game-btn" onclick="triggerGameEvent('victory')">
            <span class="game-icon">🏆</span>
            <span>模拟胜利</span>
          </button>
        </div>
      </div>

      <!-- Memory Stats -->
      <div class="panel-section">
        <div class="section-header">
          <span class="section-title">🧠 记忆</span>
        </div>
        <div class="memory-stats">
          <div class="stat-item">
            <div class="stat-value" id="msg-count">0</div>
            <div class="stat-label">消息数</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="pref-count">0</div>
            <div class="stat-label">偏好</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="event-count">0</div>
            <div class="stat-label">事件</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="fact-count">0</div>
            <div class="stat-label">事实</div>
          </div>
        </div>
      </div>
    </aside>
  </div>

  <!-- Scripts -->
  <script src="/frontend/voice/VoiceInteractionManager.js"></script>
  <script src="/frontend/voice/VoiceEmotionRecognizer.js"></script>
  <script src="/frontend/voice/EnhancedVoiceSystem.js"></script>
  <script src="/frontend/components/EmotionAnimationSystem.js"></script>
  <script src="/frontend/components/GameInteractionSystem.js"></script>
  <script src="/frontend/components/EnhancedAvatarSystem.js"></script>
  <script src="/frontend/components/EnhancedGameSystem.js"></script>
  <script src="/frontend/components/LongTermMemorySystem.js"></script>
  <script src="/frontend/components/PersonalityCustomizationSystem.js"></script>
  <script>
    // App State
    const state = {
      currentPersonality: '狐九',
      currentMood: 'happy',
      isVoiceActive: false,
      isGameMode: false,
      ttsEnabled: true,
      autoTTS: false,
      sttEnabled: true,
      messages: [],
      personalityData: {}
    };

    // Personalities
    const personalities = [
      { id: '狐九', icon: '🦊', name: '狐九', desc: '活泼可爱' },
      { id: '艾利', icon: '🦁', name: '艾利', desc: '沉稳专业' },
      { id: '博士', icon: '🎓', name: '博士', desc: '知识渊博' },
      { id: '小埋', icon: '🐱', name: '小埋', desc: '萌萌二次元' },
      { id: '零', icon: '🤖', name: '零', desc: '神秘黑客' },
      { id: '小暖', icon: '🌸', name: '小暖', desc: '温柔治愈' },
      { id: '段子手', icon: '😄', name: '段子手', desc: '搞笑幽默' },
      { id: '墨兰', icon: '🎋', name: '墨兰', desc: '古典文学' },
      { id: '钢铁星', icon: '⚙️', name: '钢铁星', desc: '机械生命' },
      { id: '甜甜', icon: '🍬', name: '甜甜', desc: '元气满满' }
    ];

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      initParticles();
      initPersonalityGrid();
      initVoiceInteraction();
    });

    function initParticles() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 50; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 15 + 's';
        particle.style.animationDuration = (15 + Math.random() * 10) + 's';
        container.appendChild(particle);
      }
    }

    function initPersonalityGrid() {
      const grid = document.getElementById('personality-grid');
      grid.innerHTML = personalities.map(p => `
        <div class="personality-card ${p.id === state.currentPersonality ? 'active' : ''}" 
             data-id="${p.id}" onclick="selectPersonality('${p.id}')">
          <div class="personality-icon">${p.icon}</div>
          <div class="personality-name">${p.name}</div>
        </div>
      `).join('');
    }

    function selectPersonality(id) {
      state.currentPersonality = id;
      const personality = personalities.find(p => p.id === id);
      
      document.querySelectorAll('.personality-card').forEach(card => {
        card.classList.toggle('active', card.dataset.id === id);
      });
      
      document.getElementById('avatar-name').textContent = personality.name;
      document.querySelector('.message-avatar').textContent = personality.icon;
      
      // Add system message
      addMessage('ai', `切换到 ${personality.name} 模式！${personality.desc}的我准备好啦~`);
    }

    function setMood(mood) {
      state.currentMood = mood;
      
      const moodEmojis = {
        happy: '😊', excited: '🤩', curious: '🤔',
        shy: '😳', sleepy: '😴', neutral: '😐',
        sad: '😢', angry: '😠'
      };
      
      const moodTexts = {
        happy: '开心', excited: '兴奋', curious: '好奇',
        shy: '害羞', sleepy: '困倦', neutral: '平静',
        sad: '难过', angry: '生气'
      };

      document.getElementById('mood-emoji').textContent = moodEmojis[mood] || '😊';
      document.getElementById('mood-text').textContent = moodTexts[mood] || '开心';
      
      document.querySelectorAll('.emotion-dot').forEach(dot => {
        dot.classList.toggle('active', dot.dataset.mood === mood);
      });
    }

    function toggleVoice() {
      toggleVoiceRecording();
    }

    function stopSpeaking() {
      if ('speechSynthesis' in window) {
        speechSynthesis.cancel();
      }
    }

    function toggleTTS() {
      state.ttsEnabled = !state.ttsEnabled;
      document.getElementById('tts-toggle').classList.toggle('active', state.ttsEnabled);
    }

    function toggleAutoTTS() {
      state.autoTTS = !state.autoTTS;
      document.getElementById('auto-tts-toggle').classList.toggle('active', state.autoTTS);
    }

    function toggleSTT() {
      state.sttEnabled = !state.sttEnabled;
      document.getElementById('stt-toggle').classList.toggle('active', state.sttEnabled);
    }

    function toggleGameMode() {
      state.isGameMode = !state.isGameMode;
      document.getElementById('game-btn').classList.toggle('active', state.isGameMode);
      document.getElementById('game-btn').querySelector('span:last-child').textContent = 
        state.isGameMode ? '停止解说' : '开始游戏解说';
      
      if (state.isGameMode) {
        addMessage('ai', '游戏解说模式开启！请选择一个游戏，或者分享你的屏幕~');
      }
    }

    function triggerGameEvent(type) {
      const events = {
        battle: ['战斗开始啦！加油加油~', '哇！好激烈的战斗！', '注意对手的动作哦~'],
        victory: ['太棒啦！胜利了！', '嘿嘿，果然厉害！', '庆祝庆祝~✨'],
        funny: ['哈哈哈！笑死我了！', '这个太搞笑了~', '噗哈哈哈~']
      };
      
      const comments = events[type] || events.battle;
      const comment = comments[Math.floor(Math.random() * comments.length)];
      addMessage('ai', comment);
      
      // Set emotion based on event
      const moodMap = { battle: 'excited', victory: 'happy', funny: 'happy' };
      setMood(moodMap[type] || 'excited');
    }

    async function sendMessage() {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text) return;

      addMessage('user', text);
      input.value = '';

      // Add typing indicator
      const typingDiv = document.createElement('div');
      typingDiv.className = 'message ai typing';
      typingDiv.innerHTML = `
        <div class="message-header">
          <div class="message-avatar">🦊</div>
          <span>${state.currentPersonality}</span>
        </div>
        <div class="typing-indicator">
          <span></span><span></span><span></span>
        </div>
      `;
      document.getElementById('chat-messages').appendChild(typingDiv);
      document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;

      try {
        // Call backend API
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            text: text,
            history: state.messages.slice(-10)
          })
        });
        
        const data = await response.json();
        typingDiv.remove();
        
        const aiResponse = data.text || data.response || data.message || generateFallbackResponse(text);
        addMessage('ai', aiResponse);
        
        // Update emotion based on response
        if (data.emotion) {
          setMood(data.emotion);
        }
        
        if (state.autoTTS) {
          speakText(aiResponse);
        }
      } catch (error) {
        console.error('Chat error:', error);
        typingDiv.remove();
        addMessage('ai', '抱歉，连接出错了...请稍后重试。');
      }
    }

    function generateFallbackResponse(text) {
      const responses = {
        '你好': '你好呀主人~狐九在这里！今天想聊什么呀？(◕‿◕)',
        '天气': '今天天气真好呢！适合出去玩~不过在家陪主人聊天也很开心！',
        '游戏': '哇！要玩游戏吗？狐九最喜欢《我的世界》了！',
        '再见': '主人要走了吗？呜呜...记得想我哦~(´;ω;`)',
        default: [
          '嗯嗯，狐九在听~',
          '好有趣！能告诉我更多吗？',
          '嘿嘿，主人真厉害~',
          '(◕‿◕) 我明白了！',
          '这个狐九不太懂诶...但是会努力学习的！'
        ]
      };

      for (const [key, value] of Object.entries(responses)) {
        if (text.includes(key)) return Array.isArray(value) ? value[Math.floor(Math.random() * value.length)] : value;
      }
      
      return responses.default[Math.floor(Math.random() * responses.default.length)];
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function addMessage(role, text) {
      const container = document.getElementById('chat-messages');
      const personality = personalities.find(p => p.id === state.currentPersonality);
      
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${role}`;
      
      const safeText = escapeHtml(text);
      
      if (role === 'user') {
        msgDiv.innerHTML = `<div>${safeText}</div>`;
      } else {
        msgDiv.innerHTML = `
          <div class="message-header">
            <div class="message-avatar">${escapeHtml(personality.icon)}</div>
            <span>${escapeHtml(personality.name)}</span>
          </div>
          <div>${safeText}</div>
        `;
      }
      
      container.appendChild(msgDiv);
      container.scrollTop = container.scrollHeight;
      
      state.messages.push({ role, text, timestamp: Date.now() });
      updateStats();
    }

    function updateStats() {
      document.getElementById('msg-count').textContent = state.messages.length;
    }

    function speakText(text) {
      if (!state.ttsEnabled || !('speechSynthesis' in window)) return;
      
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'zh-CN';
      utterance.rate = 1.1;
      utterance.pitch = 1.2;
      speechSynthesis.speak(utterance);
    }

    function handleKeyPress(event) {
      if (event.key === 'Enter') {
        sendMessage();
      }
    }

    function clearChat() {
      const container = document.getElementById('chat-messages');
      container.innerHTML = '';
      state.messages = [];
      updateStats();
      addMessage('ai', '聊天记录已清空~准备好新的对话了吗？');
    }

    function exportChat() {
      const data = JSON.stringify(state.messages, null, 2);
      const blob = new Blob([data], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `chat-${Date.now()}.json`;
      a.click();
    }

    function toggleSettings() {
      alert('设置面板开发中...');
    }

    function initVoiceInteraction() {
      console.log('Voice interaction initializing...');
      
      // Initialize VoiceInteractionManager
      if (typeof VoiceInteractionManager !== 'undefined') {
        window.voiceManager = new VoiceInteractionManager({
          onTranscript: (text) => {
            console.log('Transcript:', text);
            document.getElementById('chat-input').value = text;
          },
          onEmotion: (emotion) => {
            console.log('Detected emotion:', emotion);
            setMood(emotion);
          },
          onTTSStart: () => {
            document.getElementById('mic-btn').classList.add('speaking');
          },
          onTTSEnd: () => {
            document.getElementById('mic-btn').classList.remove('speaking');
          }
        });
        
        // Initialize emotion animation system
        if (typeof EmotionAnimationSystem !== 'undefined') {
          window.emotionSystem = new EmotionAnimationSystem({
            canvas: document.getElementById('emotion-canvas'),
            onEmotionChange: (emotion) => {
              setMood(emotion);
            }
          });
        }
        
        console.log('VoiceInteractionManager initialized');
      } else {
        console.warn('VoiceInteractionManager not loaded');
      }
    }
    
    // Voice recording toggle
    function toggleVoiceRecording() {
      if (!window.voiceManager) return;
      
      if (state.isVoiceActive) {
        window.voiceManager.stopListening();
        document.getElementById('mic-btn').classList.remove('active');
        document.getElementById('mic-btn').innerHTML = '🎤 语音';
      } else {
        window.voiceManager.startListening();
        document.getElementById('mic-btn').classList.add('active');
        document.getElementById('mic-btn').innerHTML = '🔴 说话中...';
      }
      state.isVoiceActive = !state.isVoiceActive;
    }
  </script>
</body>
</html>
