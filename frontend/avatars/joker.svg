  <path d="M55 45 Q65 40 75 45" stroke="#2D1B0E" stroke-width="2" fill="none"/>
  <!-- Big grin -->
  <path d="M30 70 Q50 85 70 70" stroke="#FF6B6B" stroke-width="3" fill="#FFB6C1"/>
  <path d="M35 72 Q50 80 65 72" fill="#FFF"/>
  <!-- Blush -->
  <ellipse cx="22" cy="65" rx="6" ry="4" fill="#FFB6C1" opacity="0.7"/>
  <ellipse cx="78" cy="65" rx="6" ry="4" fill="#FFB6C1" opacity="0.7"/>
