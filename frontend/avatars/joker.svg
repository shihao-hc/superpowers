  </defs>
  <!-- Party hat -->
  <polygon points="50,5 30,40 70,40" fill="#FF6B6B"/>
  <circle cx="50" cy="8" r="5" fill="#FFD700"/>
  <ellipse cx="50" cy="42" rx="25" ry="5" fill="#FF6B6B"/>
  <!-- Confetti dots -->
  <circle cx="25" cy="25" r="3" fill="#FF6B6B"/>
  <circle cx="75" cy="25" r="3" fill="#00BFFF"/>
  <circle cx="20" cy="50" r="2" fill="#00FF7F"/>
  <circle cx="80" cy="50" r="2" fill="#FF69B4"/>
  <!-- Hair -->
  <ellipse cx="50" cy="48" rx="35" ry="22" fill="url(#jokerGrad)"/>
  <!-- Face -->
  <ellipse cx="50" cy="60" rx="30" ry="28" fill="#FFE4B5"/>
  <!-- Eyes (mischievous) -->
  <ellipse cx="35" cy="55" rx="8" ry="10" fill="#FFF"/>
  <ellipse cx="65" cy="55" rx="8" ry="10" fill="#FFF"/>
  <ellipse cx="35" cy="56" rx="5" ry="6" fill="#2D1B0E"/>
  <ellipse cx="65" cy="56" rx="5" ry="6" fill="#2D1B0E"/>
  <ellipse cx="37" cy="54" rx="2" ry="2" fill="#FFF"/>
  <ellipse cx="67" cy="54" rx="2" ry="2" fill="#FFF"/>
