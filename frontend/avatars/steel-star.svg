<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="mechGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A5568"/>
      <stop offset="100%" style="stop-color:#2D3748"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00FFFF"/>
      <stop offset="100%" style="stop-color:#0099FF"/>
    </linearGradient>
  </defs>
  <!-- Metallic head -->
  <rect x="15" y="20" width="70" height="70" rx="10" fill="url(#mechGrad)"/>
  <rect x="20" y="25" width="60" height="60" rx="8" fill="#1A202C"/>
  <!-- Antenna -->
  <rect x="48" y="5" width="4" height="20" fill="#4A5568"/>
  <circle cx="50" cy="5" r="5" fill="#00FFFF">
    <animate attributeName="fill" values="#00FFFF;#0099FF;#00FFFF" dur="1s" repeatCount="indefinite"/>
  </circle>
  <!-- Eyes (digital display) -->
  <rect x="28" y="40" width="18" height="12" rx="2" fill="#0D1B2A"/>
  <rect x="54" y="40" width="18" height="12" rx="2" fill="#0D1B2A"/>
  <rect x="30" y="42" width="14" height="8" fill="url(#glowGrad)" opacity="0.8">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="0.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="56" y="42" width="14" height="8" fill="url(#glowGrad)" opacity="0.8">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="0.5s" repeatCount="indefinite"/>
  </rect>
  <!-- Mouth grille -->
  <rect x="35" y="65" width="30" height="10" rx="2" fill="#1A202C"/>
  <line x1="38" y1="65" x2="38" y2="75" stroke="#4A5568" stroke-width="1"/>
  <line x1="44" y1="65" x2="44" y2="75" stroke="#4A5568" stroke-width="1"/>
  <line x1="50" y1="65" x2="50" y2="75" stroke="#4A5568" stroke-width="1"/>
  <line x1="56" y1="65" x2="56" y2="75" stroke="#4A5568" stroke-width="1"/>
  <line x1="62" y1="65" x2="62" y2="75" stroke="#4A5568" stroke-width="1"/>
  <!-- Side panels -->
  <circle cx="15" cy="55" r="8" fill="#4A5568"/>
  <circle cx="85" cy="55" r="8" fill="#4A5568"/>
  <!-- Panel lights -->
  <circle cx="15" cy="55" r="3" fill="#00FF00">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="85" cy="55" r="3" fill="#00FF00">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>