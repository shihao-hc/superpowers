<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="kawaiiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB6C1"/>
      <stop offset="100%" style="stop-color:#FF69B4"/>
    </linearGradient>
  </defs>
  <!-- Hair -->
  <ellipse cx="50" cy="35" rx="40" ry="30" fill="#FFE4B5"/>
  <ellipse cx="20" cy="50" rx="15" ry="20" fill="#FFE4B5"/>
  <ellipse cx="80" cy="50" rx="15" ry="20" fill="#FFE4B5"/>
  <!-- Hair shine -->
  <path d="M30 25 Q40 20 50 25" stroke="#FFF" stroke-width="3" fill="none" opacity="0.5"/>
  <!-- Face -->
  <ellipse cx="50" cy="55" rx="32" ry="30" fill="#FFF5EE"/>
  <!-- Blush cheeks -->
  <ellipse cx="25" cy="60" rx="8" ry="5" fill="#FFB6C1" opacity="0.7"/>
  <ellipse cx="75" cy="60" rx="8" ry="5" fill="#FFB6C1" opacity="0.7"/>
  <!-- Eyes (big, sparkly) -->
  <ellipse cx="35" cy="50" rx="10" ry="12" fill="#FF69B4"/>
  <ellipse cx="65" cy="50" rx="10" ry="12" fill="#FF69B4"/>
  <ellipse cx="38" cy="47" rx="4" ry="5" fill="#FFF"/>
  <ellipse cx="68" cy="47" rx="4" ry="5" fill="#FFF"/>
  <ellipse cx="35" cy="52" rx="3" ry="3" fill="#FFF"/>
  <ellipse cx="65" cy="52" rx="3" ry="3" fill="#FFF"/>
  <!-- Star sparkles -->
  <polygon points="20,35 22,40 27,40 23,44 25,50 20,46 15,50 17,44 13,40 18,40" fill="#FFD700" transform="scale(0.3) translate(20,20)"/>
  <!-- Mouth -->
  <path d="M43 68 Q50 75 57 68" stroke="#FF69B4" stroke-width="2" fill="#FFB6C1"/>
  <!-- Hair accessory -->
  <circle cx="75" cy="30" r="8" fill="#FF69B4"/>
  <circle cx="75" cy="30" r="4" fill="#FFF"/>
</svg>