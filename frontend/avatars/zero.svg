<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="cyberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88"/>
      <stop offset="100%" style="stop-color:#00cc6a"/>
    </linearGradient>
  </defs>
  <!-- Hood -->
  <ellipse cx="50" cy="40" rx="42" ry="30" fill="url(#cyberGrad)"/>
  <!-- Face shadow -->
  <ellipse cx="50" cy="55" rx="30" ry="28" fill="#0f0f1a"/>
  <!-- Glowing eyes -->
  <ellipse cx="38" cy="50" rx="6" ry="4" fill="url(#neonGrad)">
    <animate attributeName="opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="62" cy="50" rx="6" ry="4" fill="url(#neonGrad)">
    <animate attributeName="opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Scanline -->
  <line x1="20" y1="45" x2="80" y2="45" stroke="#00ff88" stroke-width="0.5" opacity="0.3"/>
  <line x1="20" y1="55" x2="80" y2="55" stroke="#00ff88" stroke-width="0.5" opacity="0.3"/>
  <!-- Mouth (hidden, mysterious) -->
  <rect x="42" y="68" width="16" height="2" fill="#1a1a2e"/>
  <!-- Circuit pattern -->
  <circle cx="15" cy="50" r="3" fill="#00ff88" opacity="0.5"/>
  <circle cx="85" cy="50" r="3" fill="#00ff88" opacity="0.5"/>
  <line x1="18" y1="50" x2="25" y2="50" stroke="#00ff88" stroke-width="1" opacity="0.3"/>
  <line x1="75" y1="50" x2="82" y2="50" stroke="#00ff88" stroke-width="1" opacity="0.3"/>
</svg>