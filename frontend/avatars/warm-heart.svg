<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="warmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFDAB9"/>
      <stop offset="100%" style="stop-color:#FFE4C4"/>
    </linearGradient>
  </defs>
  <!-- Hair/bun -->
  <circle cx="50" cy="30" r="20" fill="#8B4513"/>
  <ellipse cx="50" cy="45" rx="38" ry="25" fill="#8B4513"/>
  <!-- Face -->
  <ellipse cx="50" cy="58" rx="32" ry="30" fill="url(#warmGrad)"/>
  <!-- Eyes (gentle, warm) -->
  <ellipse cx="35" cy="52" rx="7" ry="8" fill="#4A3728"/>
  <ellipse cx="65" cy="52" rx="7" ry="8" fill="#4A3728"/>
  <ellipse cx="37" cy="50" rx="2.5" ry="2.5" fill="#FFF"/>
  <ellipse cx="67" cy="50" rx="2.5" ry="2.5" fill="#FFF"/>
  <!-- Gentle closed-eye smile effect -->
  <path d="M28 50 Q35 47 42 50" stroke="#8B4513" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M58 50 Q65 47 72 50" stroke="#8B4513" stroke-width="1" fill="none" opacity="0.3"/>
  <!-- Blush -->
  <ellipse cx="22" cy="60" rx="8" ry="5" fill="#FFB6C1" opacity="0.5"/>
  <ellipse cx="78" cy="60" rx="8" ry="5" fill="#FFB6C1" opacity="0.5"/>
  <!-- Nose -->
  <ellipse cx="50" cy="60" rx="3" ry="2" fill="#DEB887"/>
  <!-- Warm smile -->
  <path d="M40 70 Q50 78 60 70" stroke="#8B4513" stroke-width="2" fill="none"/>
  <!-- Heart accent -->
  <path d="M50 15 C45 10 35 15 40 25 L50 35 L60 25 C65 15 55 10 50 15" fill="#FF6B6B" opacity="0.7"/>
</svg>