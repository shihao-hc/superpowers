<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="lionGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B6914"/>
      <stop offset="100%" style="stop-color:#5D4E37"/>
    </linearGradient>
  </defs>
  <!-- Mane -->
  <circle cx="50" cy="50" r="45" fill="#C4A35A"/>
  <circle cx="50" cy="50" r="40" fill="url(#lionGrad)"/>
  <!-- Face -->
  <ellipse cx="50" cy="55" rx="32" ry="30" fill="#D4A855"/>
  <!-- Eyes -->
  <ellipse cx="35" cy="48" rx="7" ry="8" fill="#2C1810"/>
  <ellipse cx="65" cy="48" rx="7" ry="8" fill="#2C1810"/>
  <ellipse cx="37" cy="46" rx="2.5" ry="2.5" fill="#FFF"/>
  <ellipse cx="67" cy="46" rx="2.5" ry="2.5" fill="#FFF"/>
  <!-- Serious brows -->
  <line x1="28" y1="40" x2="42" y2="42" stroke="#5D4E37" stroke-width="3" stroke-linecap="round"/>
  <line x1="58" y1="42" x2="72" y2="40" stroke="#5D4E37" stroke-width="3" stroke-linecap="round"/>
  <!-- Nose -->
  <ellipse cx="50" cy="60" rx="6" ry="5" fill="#5D4E37"/>
  <!-- Mouth -->
  <line x1="40" y1="70" x2="60" y2="70" stroke="#5D4E37" stroke-width="2" stroke-linecap="round"/>
  <!-- Glasses -->
  <circle cx="35" cy="48" r="12" fill="none" stroke="#4A4A4A" stroke-width="2"/>
  <circle cx="65" cy="48" r="12" fill="none" stroke="#4A4A4A" stroke-width="2"/>
  <line x1="47" y1="48" x2="53" y2="48" stroke="#4A4A4A" stroke-width="2"/>
</svg>