<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>技能市场 - UltraWork AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f23; color: #e0e0e0; min-height: 100vh; }
    .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
    header { text-align: center; margin-bottom: 2rem; }
    h1 { font-size: 2.5rem; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; }
    .subtitle { color: #888; font-size: 1.1rem; }
    
    /* Stats */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); border-radius: 12px; padding: 1.25rem; border: 1px solid #333; text-align: center; }
    .stat-value { font-size: 2.5rem; font-weight: bold; color: #667eea; }
    .stat-value.success { color: #4ade80; }
    .stat-value.warning { color: #fbbf24; }
    .stat-value.danger { color: #f87171; }
    .stat-label { color: #888; font-size: 0.85rem; margin-top: 0.25rem; }
    
    /* Navigation Tabs */
    .nav-tabs { display: flex; gap: 0.5rem; margin-bottom: 2rem; border-bottom: 1px solid #333; padding-bottom: 1rem; }
    .nav-tab { background: transparent; border: none; color: #888; font-size: 1rem; padding: 0.75rem 1.5rem; cursor: pointer; border-radius: 8px 8px 0 0; transition: all 0.2s; }
    .nav-tab:hover { color: #fff; background: #252540; }
    .nav-tab.active { color: #667eea; border-bottom: 2px solid #667eea; background: #252540; }
    
    /* Filters and Controls */
    .controls { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
    .search-input { flex: 1; min-width: 250px; background: #1a1a2e; border: 1px solid #333; border-radius: 8px; padding: 0.75rem 1rem; color: #fff; font-size: 0.95rem; }
    .search-input:focus { outline: none; border-color: #667eea; }
    .filter-btn { background: #1a1a2e; border: 1px solid #333; border-radius: 8px; padding: 0.75rem 1.25rem; color: #fff; font-size: 0.9rem; cursor: pointer; transition: all 0.2s; }
    .filter-btn:hover { background: #252540; }
    .filter-btn.active { background: #667eea; border-color: #667eea; }
    .action-btn { background: #667eea; border: none; border-radius: 8px; padding: 0.75rem 1.5rem; color: #fff; font-size: 0.9rem; cursor: pointer; transition: all 0.2s; }
    .action-btn:hover { background: #5a6fd6; }
    .action-btn.secondary { background: transparent; border: 1px solid #333; }
    .action-btn.secondary:hover { background: #252540; }
    
    /* Tab Content */
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    /* Marketplace Grid */
    .marketplace-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1.5rem; }
    
    /* Skill Card */
    .skill-card { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); border-radius: 12px; border: 1px solid #333; overflow: hidden; transition: all 0.3s; }
    .skill-card:hover { border-color: #667eea; transform: translateY(-2px); }
    .skill-card-header { padding: 1.25rem; border-bottom: 1px solid #333; }
    .skill-card-title-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem; }
    .skill-name { font-size: 1.25rem; font-weight: 600; color: #fff; }
    .skill-category { font-size: 0.8rem; color: #888; background: #252540; padding: 0.25rem 0.75rem; border-radius: 12px; }
    .skill-description { color: #aaa; font-size: 0.9rem; line-height: 1.5; margin-bottom: 0.75rem; }
    .skill-meta { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .meta-tag { font-size: 0.75rem; padding: 0.25rem 0.5rem; border-radius: 4px; }
    .meta-tag.version { background: #2d5a2d; color: #4ade80; }
    .meta-tag.author { background: #5a4d2d; color: #fbbf24; }
    .meta-tag.downloads { background: #2d4a5a; color: #60a5fa; }
    .meta-tag.rating { background: #5a2d4a; color: #f472b6; }
    
    .skill-card-stats { padding: 1rem 1.25rem; background: rgba(0,0,0,0.2); display: flex; justify-content: space-between; align-items: center; }
    .stat-item { display: flex; align-items: center; gap: 0.5rem; }
    .stat-icon { font-size: 1rem; }
    .stat-text { font-size: 0.85rem; color: #888; }
    
    .skill-card-actions { padding: 1rem 1.25rem; display: flex; justify-content: space-between; gap: 0.5rem; }
    
    /* Version Management */
    .version-list { margin-top: 1rem; }
    .version-item { background: #252540; border-radius: 8px; padding: 1rem; margin-bottom: 0.5rem; border: 1px solid #333; }
    .version-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
    .version-number { font-weight: 600; color: #667eea; }
    .version-date { font-size: 0.8rem; color: #888; }
    .version-status { font-size: 0.75rem; padding: 0.25rem 0.5rem; border-radius: 4px; }
    .version-status.active { background: #2d5a2d; color: #4ade80; }
    .version-status.deprecated { background: #5a4d2d; color: #fbbf24; }
    .version-status.archived { background: #4a4a4a; color: #aaa; }
    .version-changelog { color: #aaa; font-size: 0.9rem; margin-top: 0.5rem; }
    
    /* Upload Modal */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
    .modal.active { display: flex; }
    .modal-content { background: #1a1a2e; border-radius: 12px; border: 1px solid #333; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; }
    .modal-header { padding: 1.25rem; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
    .modal-title { font-size: 1.25rem; font-weight: 600; }
    .modal-close { background: transparent; border: none; color: #888; font-size: 1.5rem; cursor: pointer; }
    .modal-close:hover { color: #fff; }
    .modal-body { padding: 1.25rem; }
    .modal-footer { padding: 1rem 1.25rem; background: rgba(0,0,0,0.2); display: flex; justify-content: flex-end; gap: 1rem; }
    
    /* Form Elements */
    .form-group { margin-bottom: 1rem; }
    .form-label { display: block; margin-bottom: 0.5rem; color: #888; font-size: 0.9rem; }
    .form-input, .form-textarea, .form-select { width: 100%; background: #0f0f23; border: 1px solid #333; border-radius: 6px; padding: 0.75rem; color: #fff; font-size: 0.9rem; }
    .form-input:focus, .form-textarea:focus, .form-select:focus { outline: none; border-color: #667eea; }
    .form-textarea { min-height: 100px; resize: vertical; }
    .form-hint { font-size: 0.8rem; color: #666; margin-top: 0.25rem; }
    
    /* Rating Stars */
    .rating { display: flex; gap: 0.25rem; }
    .star { color: #333; font-size: 1.25rem; cursor: pointer; }
    .star.filled { color: #fbbf24; }
    .star:hover { color: #fbbf24; }
    
    /* Toast Notifications */
    .toast-container { position: fixed; top: 20px; right: 20px; z-index: 2000; display: flex; flex-direction: column; gap: 0.5rem; }
    .toast { background: #1a1a2e; border-radius: 8px; border: 1px solid #333; padding: 1rem 1.25rem; color: #fff; min-width: 300px; animation: slideIn 0.3s ease-out; }
    .toast.success { border-color: #4ade80; }
    .toast.error { border-color: #f87171; }
    .toast.warning { border-color: #fbbf24; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    
    /* Responsive */
    @media (max-width: 768px) {
      .container { padding: 1rem; }
      .marketplace-grid { grid-template-columns: 1fr; }
      .controls { flex-direction: column; }
      .search-input { width: 100%; }
    }
    
    /* Loading Spinner */
    .loading { display: inline-block; width: 16px; height: 16px; border: 2px solid #333; border-radius: 50%; border-top-color: #667eea; animation: spin 1s ease-in-out infinite; vertical-align: middle; margin-right: 0.5rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* Skill Card Enhancements */
    .skill-screenshot { width: 100%; height: 150px; background: #0f0f23; border-radius: 8px; margin-bottom: 1rem; display: flex; align-items: center; justify-content: center; color: #666; font-size: 0.9rem; overflow: hidden; }
    .skill-usage { font-size: 0.8rem; color: #888; margin-top: 0.5rem; padding: 0.5rem; background: rgba(0,0,0,0.2); border-radius: 6px; }
    .skill-tags { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem; }
    .skill-tag { font-size: 0.7rem; padding: 0.15rem 0.4rem; background: #252540; border-radius: 4px; color: #aaa; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>技能市场</h1>
      <p class="subtitle">发现、分享和管理 AI 技能</p>
      <div class="role-selector" style="margin-top: 1rem;">
        <label style="color: #888; margin-right: 0.5rem;">用户角色:</label>
        <select id="userRole" style="background: #1a1a2e; border: 1px solid #333; border-radius: 6px; padding: 0.5rem 1rem; color: #fff; font-size: 0.9rem; cursor: pointer;">
          <option value="user">普通用户 (只读)</option>
          <option value="developer">开发者 (发布/版本)</option>
          <option value="publisher">发布者 (发布技能)</option>
          <option value="admin">管理员 (完全访问)</option>
        </select>
        <span id="roleBadge" class="role-badge user">普通用户</span>
      </div>
    </header>
    
    <div class="nav-tabs">
      <button class="nav-tab active" data-tab="browse">浏览市场</button>
      <button class="nav-tab" data-tab="publish">发布技能</button>
      <button class="nav-tab" data-tab="my-skills">我的技能</button>
      <button class="nav-tab" data-tab="versions">版本管理</button>
    </div>
    
    <!-- Browse Tab -->
    <div class="tab-content active" id="browse-tab">
      <div class="stats">
        <div class="stat-card">
          <div class="stat-value" id="totalSkills">0</div>
          <div class="stat-label">总技能数</div>
        </div>
        <div class="stat-card">
          <div class="stat-value success" id="publishedSkills">0</div>
          <div class="stat-label">已发布</div>
        </div>
        <div class="stat-card">
          <div class="stat-value warning" id="totalDownloads">0</div>
          <div class="stat-label">总下载量</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="averageRating">0</div>
          <div class="stat-label">平均评分</div>
        </div>
      </div>
      
      <div class="controls">
        <input type="text" class="search-input" id="searchInput" placeholder="搜索技能名称、描述或关键词...">
        <select class="filter-select" id="categoryFilter">
          <option value="">所有分类</option>
          <option value="Document Processing">文档处理</option>
          <option value="Graphics & Design">图形设计</option>
          <option value="AI Integration">AI 集成</option>
          <option value="Development Tools">开发工具</option>
          <option value="General">通用</option>
        </select>
        <select class="filter-select" id="sortBy">
          <option value="updatedAt">最新更新</option>
          <option value="downloads">最多下载</option>
          <option value="rating">最高评分</option>
          <option value="createdAt">最新发布</option>
        </select>
        <button class="action-btn" id="refreshBtn">刷新</button>
      </div>
      
      <div class="marketplace-grid" id="marketplaceGrid">
        <!-- Skills will be loaded here -->
      </div>
      
      <!-- Load More Button -->
      <div id="loadMoreContainer" style="text-align: center; margin-top: 2rem; display: none;">
        <button class="action-btn secondary" id="loadMoreBtn">
          <span class="loading" id="loadMoreSpinner" style="display: none;"></span>
          加载更多技能
        </button>
        <div id="noMoreSkills" style="color: #888; margin-top: 1rem; display: none;">没有更多技能了</div>
      </div>
    </div>
    
    <!-- Publish Tab -->
    <div class="tab-content" id="publish-tab">
      <div style="max-width: 800px; margin: 0 auto;">
        <h2 style="margin-bottom: 1.5rem; color: #667eea;">发布新技能</h2>
        
        <div class="form-group">
          <label class="form-label">技能名称 *</label>
          <input type="text" class="form-input" id="publishName" placeholder="my-awesome-skill">
          <div class="form-hint">使用小写字母、数字和连字符</div>
        </div>
        
        <div class="form-group">
          <label class="form-label">描述 *</label>
          <textarea class="form-textarea" id="publishDescription" placeholder="描述你的技能功能..."></textarea>
        </div>
        
        <div class="form-group">
          <label class="form-label">版本号 *</label>
          <input type="text" class="form-input" id="publishVersion" placeholder="1.0.0">
          <div class="form-hint">使用语义化版本号 (例如: 1.0.0)</div>
        </div>
        
        <div class="form-group">
          <label class="form-label">分类</label>
          <select class="form-select" id="publishCategory">
            <option value="General">通用</option>
            <option value="Document Processing">文档处理</option>
            <option value="Graphics & Design">图形设计</option>
            <option value="AI Integration">AI 集成</option>
            <option value="Development Tools">开发工具</option>
          </select>
        </div>
        
        <div class="form-group">
          <label class="form-label">作者</label>
          <input type="text" class="form-input" id="publishAuthor" placeholder="Your Name">
        </div>
        
        <div class="form-group">
          <label class="form-label">技能包 (ZIP)</label>
          <input type="file" class="form-input" id="publishFile" accept=".zip">
          <div class="form-hint">上传包含 skill.md 和脚本的 ZIP 文件</div>
        </div>
        
        <div class="form-group">
          <label class="form-label">或 Git 仓库 URL</label>
          <input type="text" class="form-input" id="publishRepo" placeholder="https://github.com/user/repo.git">
        </div>
        
        <div class="form-group">
          <label class="form-label">更新日志</label>
          <textarea class="form-textarea" id="publishChangelog" placeholder="描述本次更新的内容..."></textarea>
        </div>
        
        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
          <button class="action-btn" id="publishBtn">发布技能</button>
          <button class="action-btn secondary" id="validateBtn">预览验证</button>
        </div>
      </div>
    </div>
    
    <!-- My Skills Tab -->
    <div class="tab-content" id="my-skills-tab">
      <div style="max-width: 1200px; margin: 0 auto;">
        <h2 style="margin-bottom: 1.5rem; color: #667eea;">我的技能</h2>
        <div id="mySkillsList">
          <!-- User's skills will be loaded here -->
        </div>
      </div>
    </div>
    
    <!-- Versions Tab -->
    <div class="tab-content" id="versions-tab">
      <div style="max-width: 1200px; margin: 0 auto;">
        <h2 style="margin-bottom: 1.5rem; color: #667eea;">版本管理</h2>
        
        <div class="controls">
          <select class="filter-select" id="versionSkillSelect">
            <option value="">选择技能</option>
          </select>
          <button class="action-btn" id="loadVersionsBtn">加载版本</button>
          <button class="action-btn secondary" id="createVersionBtn">创建新版本</button>
        </div>
        
        <div id="versionList">
          <!-- Version history will be loaded here -->
        </div>
      </div>
    </div>
  </div>
  
  <!-- Skill Detail Modal -->
  <div class="modal" id="skillDetailModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title" id="skillDetailTitle">技能详情</h3>
        <button class="modal-close" id="closeSkillDetailModal">&times;</button>
      </div>
      <div class="modal-body" id="skillDetailContent">
        <!-- Skill details will be loaded here -->
      </div>
      <div class="modal-footer">
        <button class="action-btn secondary" id="closeSkillDetailBtn">关闭</button>
        <button class="action-btn" id="downloadSkillBtn">下载</button>
        <button class="action-btn" id="addReviewBtn">添加评价</button>
      </div>
    </div>
  </div>
  
  <!-- Review Modal -->
  <div class="modal" id="reviewModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">添加评价</h3>
        <button class="modal-close" id="closeReviewModal">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">评分 *</label>
          <div class="rating" id="ratingStars">
            <span class="star" data-rating="1">★</span>
            <span class="star" data-rating="2">★</span>
            <span class="star" data-rating="3">★</span>
            <span class="star" data-rating="4">★</span>
            <span class="star" data-rating="5">★</span>
          </div>
        </div>
        
        <div class="form-group">
          <label class="form-label">标题</label>
          <input type="text" class="form-input" id="reviewTitle" placeholder="评价标题">
        </div>
        
        <div class="form-group">
          <label class="form-label">内容</label>
          <textarea class="form-textarea" id="reviewContent" placeholder="详细评价..."></textarea>
        </div>
        
        <div class="form-group">
          <label class="form-label">评价者</label>
          <input type="text" class="form-input" id="reviewReviewer" placeholder="Anonymous">
        </div>
      </div>
      <div class="modal-footer">
        <button class="action-btn secondary" id="cancelReviewBtn">取消</button>
        <button class="action-btn" id="submitReviewBtn">提交评价</button>
      </div>
    </div>
  </div>
  
  <!-- Version Modal -->
  <div class="modal" id="versionModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">创建新版本</h3>
        <button class="modal-close" id="closeVersionModal">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">版本号 *</label>
          <input type="text" class="form-input" id="newVersionNumber" placeholder="1.0.0">
        </div>
        
        <div class="form-group">
          <label class="form-label">更新日志 *</label>
          <textarea class="form-textarea" id="newVersionChangelog" placeholder="描述本次更新的内容..."></textarea>
        </div>
        
        <div class="form-group">
          <label class="form-label">描述</label>
          <textarea class="form-textarea" id="newVersionDescription" placeholder="版本描述..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="action-btn secondary" id="cancelVersionBtn">取消</button>
        <button class="action-btn" id="createVersionConfirmBtn">创建版本</button>
      </div>
    </div>
  </div>
  
  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>
  
  <script>
    class MarketplaceManager {
      constructor() {
        this.currentTab = 'browse';
        this.currentSkill = null;
        this.currentRating = 0;
        this.skills = [];
        this.categories = [];
        this.offset = 0;
        this.hasMore = true;
        this.isLoading = false;
        
        this.init();
      }
      
      async init() {
        this.bindEvents();
        await this.loadMarketplaceStats();
        await this.loadSkills(true);
        await this.loadCategories();
      }
      
      bindEvents() {
        // Tab navigation
        document.querySelectorAll('.nav-tab').forEach(tab => {
          tab.addEventListener('click', (e) => {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            e.target.classList.add('active');
            this.currentTab = e.target.dataset.tab;
            this.switchTab(this.currentTab);
          });
        });
        
        // Search and filters
        let searchTimeout;
        document.getElementById('searchInput').addEventListener('input', () => {
          clearTimeout(searchTimeout);
          searchTimeout = setTimeout(() => this.loadSkills(true), 300);
        });
        document.getElementById('categoryFilter').addEventListener('change', () => this.loadSkills(true));
        document.getElementById('sortBy').addEventListener('change', () => this.loadSkills(true));
        
        // Refresh
        document.getElementById('refreshBtn').addEventListener('click', () => {
          this.loadMarketplaceStats();
          this.loadSkills(true);
        });
        
        // Load more button
        document.getElementById('loadMoreBtn').addEventListener('click', () => {
          this.loadMore();
        });
        
        // Infinite scroll
        window.addEventListener('scroll', () => {
          if (this.shouldLoadMore()) {
            this.loadMore();
          }
        });
        
        // Publish form
        document.getElementById('publishBtn').addEventListener('click', () => this.publishSkill());
        document.getElementById('validateBtn').addEventListener('click', () => this.validateSkill());
        
        // Version management
        document.getElementById('loadVersionsBtn').addEventListener('click', () => this.loadVersions());
        document.getElementById('createVersionBtn').addEventListener('click', () => this.openVersionModal());
        
        // Modals
        document.getElementById('closeSkillDetailModal').addEventListener('click', () => this.closeModal('skillDetailModal'));
        document.getElementById('closeSkillDetailBtn').addEventListener('click', () => this.closeModal('skillDetailModal'));
        document.getElementById('downloadSkillBtn').addEventListener('click', () => this.downloadSkill());
        document.getElementById('addReviewBtn').addEventListener('click', () => this.openReviewModal());
        
        document.getElementById('closeReviewModal').addEventListener('click', () => this.closeModal('reviewModal'));
        document.getElementById('cancelReviewBtn').addEventListener('click', () => this.closeModal('reviewModal'));
        document.getElementById('submitReviewBtn').addEventListener('click', () => this.submitReview());
        
        document.getElementById('closeVersionModal').addEventListener('click', () => this.closeModal('versionModal'));
        document.getElementById('cancelVersionBtn').addEventListener('click', () => this.closeModal('versionModal'));
        document.getElementById('createVersionConfirmBtn').addEventListener('click', () => this.createVersion());
        
        // Rating stars
        document.querySelectorAll('#ratingStars .star').forEach(star => {
          star.addEventListener('click', (e) => {
            this.currentRating = parseInt(e.target.dataset.rating);
            this.updateRatingStars();
          });
        });
      }
      
      switchTab(tabName) {
        // Hide all tabs
        document.querySelectorAll('.tab-content').forEach(tab => {
          tab.classList.remove('active');
        });
        
        // Show selected tab
        document.getElementById(`${tabName}-tab`).classList.add('active');
        
        // Load data based on tab
        switch (tabName) {
          case 'browse':
            this.loadSkills();
            break;
          case 'my-skills':
            this.loadMySkills();
            break;
          case 'versions':
            this.loadSkillOptions();
            break;
        }
      }
      
      async loadMarketplaceStats() {
        try {
          const response = await fetch('/api/skills/marketplace/stats');
          const stats = await response.json();
          
          document.getElementById('totalSkills').textContent = stats.totalSkills || 0;
          document.getElementById('publishedSkills').textContent = stats.publishedSkills || 0;
          document.getElementById('totalDownloads').textContent = stats.totalDownloads || 0;
          document.getElementById('averageRating').textContent = (stats.averageRating || 0).toFixed(1);
        } catch (error) {
          console.error('Failed to load marketplace stats:', error);
        }
      }
      
      async loadSkills(reset = false) {
        try {
          const search = document.getElementById('searchInput').value;
          const category = document.getElementById('categoryFilter').value;
          const sortBy = document.getElementById('sortBy').value;
          
          if (reset) {
            this.skills = [];
            this.offset = 0;
            this.hasMore = true;
          }
          
          if (!this.hasMore) return;
          
          const params = new URLSearchParams({
            search,
            category,
            sortBy,
            sortOrder: 'desc',
            limit: 12,
            offset: this.offset
          });
          
          const response = await fetch(`/api/skills/marketplace?${params}`);
          const data = await response.json();
          
          const newSkills = data.skills || [];
          
          if (reset) {
            this.skills = newSkills;
          } else {
            this.skills = [...this.skills, ...newSkills];
          }
          
          this.offset += newSkills.length;
          this.hasMore = newSkills.length >= 12;
          
          this.renderSkills();
          this.updateLoadMoreButton();
        } catch (error) {
          console.error('Failed to load skills:', error);
          this.showToast('加载技能列表失败', 'error');
        }
      }
      
      renderSkills() {
        const grid = document.getElementById('marketplaceGrid');
        grid.innerHTML = '';
        
        if (this.skills.length === 0) {
          grid.innerHTML = `
            <div style="grid-column: 1 / -1; text-align: center; padding: 3rem; color: #888;">
              <p>没有找到技能</p>
            </div>
          `;
          document.getElementById('loadMoreContainer').style.display = 'none';
          return;
        }
        
        this.skills.forEach(skill => {
          const card = this.createSkillCard(skill);
          grid.appendChild(card);
        });
      }
      
      async loadMore() {
        if (this.isLoading || !this.hasMore) return;
        
        this.isLoading = true;
        document.getElementById('loadMoreBtn').disabled = true;
        document.getElementById('loadMoreSpinner').style.display = 'inline-block';
        
        try {
          await this.loadSkills(false);
        } finally {
          this.isLoading = false;
          document.getElementById('loadMoreBtn').disabled = false;
          document.getElementById('loadMoreSpinner').style.display = 'none';
        }
      }
      
      shouldLoadMore() {
        if (this.isLoading || !this.hasMore) return false;
        
        const scrollPosition = window.innerHeight + window.scrollY;
        const documentHeight = document.documentElement.scrollHeight;
        
        return scrollPosition >= documentHeight - 500;
      }
      
      updateLoadMoreButton() {
        const container = document.getElementById('loadMoreContainer');
        const noMore = document.getElementById('noMoreSkills');
        
        if (this.skills.length > 0) {
          container.style.display = 'block';
          
          if (this.hasMore) {
            noMore.style.display = 'none';
            document.getElementById('loadMoreBtn').style.display = 'inline-block';
          } else {
            noMore.style.display = 'block';
            document.getElementById('loadMoreBtn').style.display = 'none';
          }
        } else {
          container.style.display = 'none';
        }
      }
      
      createSkillCard(skill) {
        const card = document.createElement('div');
        card.className = 'skill-card';
        
        // Create screenshot placeholder
        const screenshotHTML = skill.screenshot ? 
          `<img src="${skill.screenshot}" alt="${skill.name}" style="width: 100%; height: 150px; object-fit: cover; border-radius: 8px; margin-bottom: 1rem;">` :
          `<div class="skill-screenshot">预览图不可用</div>`;
        
        // Create usage example if available
        const usageHTML = skill.usageExample ? 
          `<div class="skill-usage"><strong>使用示例:</strong> ${skill.usageExample.substring(0, 100)}${skill.usageExample.length > 100 ? '...' : ''}</div>` : '';
        
        // Create tags from keywords
        const tagsHTML = skill.keywords && skill.keywords.length > 0 ? 
          `<div class="skill-tags">${skill.keywords.slice(0, 3).map(k => `<span class="skill-tag">${k}</span>`).join('')}${skill.keywords.length > 3 ? `<span class="skill-tag">+${skill.keywords.length - 3}</span>` : ''}</div>` : '';
        
        card.innerHTML = `
          <div class="skill-card-header">
            ${screenshotHTML}
            <div class="skill-card-title-row">
              <div class="skill-name">${skill.name}</div>
              <div class="skill-category">${skill.category || 'General'}</div>
            </div>
            <div class="skill-description">${skill.description || '无描述'}</div>
            <div class="skill-meta">
              <span class="meta-tag version">v${skill.version}</span>
              <span class="meta-tag author">${skill.author}</span>
              <span class="meta-tag downloads">⬇ ${skill.downloads || 0}</span>
              <span class="meta-tag rating">★ ${(skill.rating || 0).toFixed(1)}</span>
            </div>
            ${tagsHTML}
          </div>
          <div class="skill-card-stats">
            <div class="stat-item">
              <span class="stat-icon">📅</span>
              <span class="stat-text">${new Date(skill.updatedAt).toLocaleDateString()}</span>
            </div>
            <div class="stat-item">
              <span class="stat-icon">👁</span>
              <span class="stat-text">${skill.viewCount || 0} 浏览</span>
            </div>
          </div>
          ${usageHTML}
          <div class="skill-card-actions">
            <button class="action-btn secondary" data-action="details" data-skill="${skill.id}">详情</button>
            <button class="action-btn" data-action="download" data-skill="${skill.id}">下载</button>
          </div>
        `;
        
        // Add event listeners
        card.querySelectorAll('.action-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const action = e.target.dataset.action;
            const skillId = e.target.dataset.skill;
            this.handleAction(action, skillId);
          });
        });
        
        return card;
      }
      
      async loadCategories() {
        try {
          const response = await fetch('/api/skills/marketplace/categories');
          const data = await response.json();
          this.categories = data.categories || [];
        } catch (error) {
          console.error('Failed to load categories:', error);
        }
      }
      
      async handleAction(action, skillId) {
        switch (action) {
          case 'details':
            await this.showSkillDetails(skillId);
            break;
          case 'download':
            await this.downloadSkillById(skillId);
            break;
        }
      }
      
      async showSkillDetails(skillId) {
        try {
          const response = await fetch(`/api/skills/marketplace/${skillId}`);
          const data = await response.json();
          
          this.currentSkill = data.skill;
          
          // Update modal content
          document.getElementById('skillDetailTitle').textContent = data.skill.name;
          document.getElementById('skillDetailContent').innerHTML = this.createSkillDetailHTML(data);
          
          this.openModal('skillDetailModal');
        } catch (error) {
          console.error('Failed to load skill details:', error);
          this.showToast('加载技能详情失败', 'error');
        }
      }
      
      createSkillDetailHTML(data) {
        const { skill, stats, reviews } = data;
        
        let reviewsHTML = '';
        if (reviews && reviews.reviews && reviews.reviews.length > 0) {
          reviewsHTML = `
            <h4 style="margin: 1.5rem 0 1rem; color: #667eea;">用户评价 (${reviews.total})</h4>
            <div style="max-height: 200px; overflow-y: auto;">
              ${reviews.reviews.map(review => `
                <div style="background: #252540; border-radius: 8px; padding: 1rem; margin-bottom: 0.5rem;">
                  <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                    <div style="color: #fbbf24;">${'★'.repeat(review.rating)}${'☆'.repeat(5 - review.rating)}</div>
                    <div style="color: #888; font-size: 0.8rem;">${new Date(review.createdAt).toLocaleDateString()}</div>
                  </div>
                  ${review.title ? `<div style="font-weight: 600; margin-bottom: 0.25rem;">${review.title}</div>` : ''}
                  <div style="color: #aaa; font-size: 0.9rem;">${review.content || ''}</div>
                  <div style="color: #666; font-size: 0.8rem; margin-top: 0.5rem;">by ${review.reviewer}</div>
                </div>
              `).join('')}
            </div>
          `;
        }
        
        return `
          <div>
            <p style="margin-bottom: 1rem; color: #aaa;">${skill.description || ''}</p>
            
            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-bottom: 1.5rem;">
              <div><strong>版本:</strong> ${skill.version}</div>
              <div><strong>作者:</strong> ${skill.author}</div>
              <div><strong>分类:</strong> ${skill.category}</div>
              <div><strong>风险等级:</strong> ${skill.riskLevel || 'low'}</div>
              <div><strong>下载量:</strong> ${stats.downloads || 0}</div>
              <div><strong>评分:</strong> ${(stats.rating || 0).toFixed(1)} (${stats.ratingCount || 0} 评价)</div>
              <div><strong>浏览量:</strong> ${stats.viewCount || 0}</div>
              <div><strong>发布日期:</strong> ${new Date(skill.publishedAt).toLocaleDateString()}</div>
            </div>
            
            ${skill.keywords && skill.keywords.length > 0 ? `
              <div style="margin-bottom: 1rem;">
                <strong>关键词:</strong> ${skill.keywords.join(', ')}
              </div>
            ` : ''}
            
            ${skill.dependencies && skill.dependencies.length > 0 ? `
              <div style="margin-bottom: 1rem;">
                <strong>依赖:</strong> ${skill.dependencies.join(', ')}
              </div>
            ` : ''}
            
            ${reviewsHTML}
          </div>
        `;
      }
      
      async downloadSkillById(skillId) {
        try {
          // Record download
          await fetch(`/api/skills/marketplace/${skillId}/download`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ downloader: 'frontend-user' })
          });
          
          this.showToast('下载已开始', 'success');
          
          // In a real implementation, this would trigger actual download
          // For now, just show a message
          setTimeout(() => {
            this.showToast('技能包下载完成', 'success');
          }, 1000);
        } catch (error) {
          console.error('Failed to download skill:', error);
          this.showToast('下载失败', 'error');
        }
      }
      
      async downloadSkill() {
        if (!this.currentSkill) return;
        await this.downloadSkillById(this.currentSkill.id);
        this.closeModal('skillDetailModal');
      }
      
      async publishSkill() {
        const name = document.getElementById('publishName').value;
        const description = document.getElementById('publishDescription').value;
        const version = document.getElementById('publishVersion').value;
        const category = document.getElementById('publishCategory').value;
        const author = document.getElementById('publishAuthor').value;
        const changelog = document.getElementById('publishChangelog').value;
        
        if (!name || !description || !version) {
          this.showToast('请填写必填字段', 'error');
          return;
        }
        
        try {
          // In a real implementation, this would upload the file or Git URL
          // For now, just create the marketplace entry
          const response = await fetch('/api/skills/marketplace/publish', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              name,
              description,
              version,
              category,
              author,
              changelog,
              riskLevel: 'low',
              pure: false,
              dependencies: [],
              license: 'MIT',
              keywords: []
            })
          });
          
          const result = await response.json();
          
          if (result.ok) {
            this.showToast('技能发布成功', 'success');
            this.clearPublishForm();
            this.switchTab('browse');
            this.loadSkills();
            this.loadMarketplaceStats();
          } else {
            this.showToast('发布失败: ' + (result.error || 'Unknown error'), 'error');
          }
        } catch (error) {
          console.error('Failed to publish skill:', error);
          this.showToast('发布失败', 'error');
        }
      }
      
      async validateSkill() {
        // This would validate the uploaded ZIP file
        this.showToast('验证功能需要后端支持', 'warning');
      }
      
      clearPublishForm() {
        document.getElementById('publishName').value = '';
        document.getElementById('publishDescription').value = '';
        document.getElementById('publishVersion').value = '';
        document.getElementById('publishCategory').value = 'General';
        document.getElementById('publishAuthor').value = '';
        document.getElementById('publishChangelog').value = '';
        document.getElementById('publishFile').value = '';
        document.getElementById('publishRepo').value = '';
      }
      
      async loadMySkills() {
        // This would load skills published by the current user
        // For now, show a placeholder
        document.getElementById('mySkillsList').innerHTML = `
          <div style="text-align: center; padding: 3rem; color: #888;">
            <p>我的技能功能需要用户认证</p>
          </div>
        `;
      }
      
      async loadSkillOptions() {
        try {
          const response = await fetch('/api/skills');
          const data = await response.json();
          const skills = data.skills || [];
          
          const select = document.getElementById('versionSkillSelect');
          select.innerHTML = '<option value="">选择技能</option>';
          
          skills.forEach(skill => {
            const option = document.createElement('option');
            option.value = skill.name;
            option.textContent = skill.name;
            select.appendChild(option);
          });
        } catch (error) {
          console.error('Failed to load skills:', error);
        }
      }
      
      async loadVersions() {
        const skillName = document.getElementById('versionSkillSelect').value;
        if (!skillName) {
          this.showToast('请选择一个技能', 'warning');
          return;
        }
        
        try {
          const response = await fetch(`/api/skills/versions/${skillName}/history`);
          const data = await response.json();
          
          this.renderVersions(data.versions || []);
        } catch (error) {
          console.error('Failed to load versions:', error);
          this.showToast('加载版本历史失败', 'error');
        }
      }
      
      renderVersions(versions) {
        const container = document.getElementById('versionList');
        
        if (versions.length === 0) {
          container.innerHTML = `
            <div style="text-align: center; padding: 3rem; color: #888;">
              <p>没有版本历史</p>
            </div>
          `;
          return;
        }
        
        container.innerHTML = versions.map(version => `
          <div class="version-item">
            <div class="version-header">
              <div>
                <span class="version-number">v${version.version}</span>
                <span class="version-status ${version.status}">${version.status}</span>
              </div>
              <div class="version-date">${new Date(version.createdAt).toLocaleDateString()}</div>
            </div>
            ${version.description ? `<div style="color: #aaa; margin-bottom: 0.5rem;">${version.description}</div>` : ''}
            ${version.changelog ? `<div class="version-changelog">${version.changelog}</div>` : ''}
            <div style="margin-top: 0.5rem; display: flex; gap: 0.5rem;">
              <button class="action-btn secondary" onclick="marketplaceManager.rollbackToVersion('${version.skillName}', '${version.version}')">回滚</button>
              <button class="action-btn secondary" onclick="marketplaceManager.deprecateVersion('${version.skillName}', '${version.version}')">弃用</button>
            </div>
          </div>
        `).join('');
      }
      
      openReviewModal() {
        this.currentRating = 0;
        this.updateRatingStars();
        document.getElementById('reviewTitle').value = '';
        document.getElementById('reviewContent').value = '';
        document.getElementById('reviewReviewer').value = '';
        this.openModal('reviewModal');
      }
      
      updateRatingStars() {
        document.querySelectorAll('#ratingStars .star').forEach(star => {
          const rating = parseInt(star.dataset.rating);
          star.classList.toggle('filled', rating <= this.currentRating);
        });
      }
      
      async submitReview() {
        if (!this.currentSkill) return;
        
        const rating = this.currentRating;
        const title = document.getElementById('reviewTitle').value;
        const content = document.getElementById('reviewContent').value;
        const reviewer = document.getElementById('reviewReviewer').value || 'Anonymous';
        
        if (!rating) {
          this.showToast('请选择评分', 'error');
          return;
        }
        
        try {
          const response = await fetch(`/api/skills/marketplace/${this.currentSkill.id}/reviews`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ rating, title, content, reviewer })
          });
          
          const result = await response.json();
          
          if (result.ok) {
            this.showToast('评价提交成功', 'success');
            this.closeModal('reviewModal');
            // Reload skill details
            await this.showSkillDetails(this.currentSkill.id);
          } else {
            this.showToast('提交失败: ' + (result.error || 'Unknown error'), 'error');
          }
        } catch (error) {
          console.error('Failed to submit review:', error);
          this.showToast('提交失败', 'error');
        }
      }
      
      openVersionModal() {
        const skillName = document.getElementById('versionSkillSelect').value;
        if (!skillName) {
          this.showToast('请先选择一个技能', 'warning');
          return;
        }
        
        document.getElementById('newVersionNumber').value = '';
        document.getElementById('newVersionChangelog').value = '';
        document.getElementById('newVersionDescription').value = '';
        this.openModal('versionModal');
      }
      
      async createVersion() {
        const skillName = document.getElementById('versionSkillSelect').value;
        const version = document.getElementById('newVersionNumber').value;
        const changelog = document.getElementById('newVersionChangelog').value;
        const description = document.getElementById('newVersionDescription').value;
        
        if (!skillName || !version || !changelog) {
          this.showToast('请填写必填字段', 'error');
          return;
        }
        
        try {
          const response = await fetch(`/api/skills/versions/${skillName}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ version, changelog, description, author: 'frontend-user' })
          });
          
          const result = await response.json();
          
          if (result.ok) {
            this.showToast('版本创建成功', 'success');
            this.closeModal('versionModal');
            this.loadVersions();
          } else {
            this.showToast('创建失败: ' + (result.error || 'Unknown error'), 'error');
          }
        } catch (error) {
          console.error('Failed to create version:', error);
          this.showToast('创建失败', 'error');
        }
      }
      
      async rollbackToVersion(skillName, targetVersion) {
        if (!confirm(`确定要回滚到版本 ${targetVersion} 吗？`)) return;
        
        try {
          const response = await fetch(`/api/skills/versions/${skillName}/rollback`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ targetVersion })
          });
          
          const result = await response.json();
          
          if (result.ok) {
            this.showToast(`已回滚到版本 ${targetVersion}`, 'success');
            this.loadVersions();
          } else {
            this.showToast('回滚失败: ' + (result.error || 'Unknown error'), 'error');
          }
        } catch (error) {
          console.error('Failed to rollback:', error);
          this.showToast('回滚失败', 'error');
        }
      }
      
      async deprecateVersion(skillName, version) {
        if (!confirm(`确定要弃用版本 ${version} 吗？`)) return;
        
        try {
          const response = await fetch(`/api/skills/versions/${skillName}/${version}/status`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status: 'deprecated', reason: 'Deprecated by user' })
          });
          
          const result = await response.json();
          
          if (result.ok) {
            this.showToast(`版本 ${version} 已弃用`, 'success');
            this.loadVersions();
          } else {
            this.showToast('操作失败: ' + (result.error || 'Unknown error'), 'error');
          }
        } catch (error) {
          console.error('Failed to deprecate version:', error);
          this.showToast('操作失败', 'error');
        }
      }
      
      openModal(modalId) {
        document.getElementById(modalId).classList.add('active');
      }
      
      closeModal(modalId) {
        document.getElementById(modalId).classList.remove('active');
      }
      
      showToast(message, type = 'success') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.textContent = message;
        container.appendChild(toast);
        
        setTimeout(() => {
          toast.remove();
        }, 3000);
      }
    }
    
    // Initialize the marketplace manager
    const marketplaceManager = new MarketplaceManager();
  </script>
</body>
</html>
