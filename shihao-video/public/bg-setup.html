<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>背景图片设置工具 - 拾号-影视</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: rgba(0, 0, 0, 0.7);
      border-radius: 16px;
      padding: 40px;
      backdrop-filter: blur(10px);
    }
    h1 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 2rem;
      background: linear-gradient(45deg, #e50914, #ff6b6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .section {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .section h2 {
      color: #e50914;
      margin-bottom: 16px;
      font-size: 1.3rem;
    }
    .section p {
      color: #b3b3b3;
      margin-bottom: 16px;
      line-height: 1.6;
    }
    .upload-area {
      border: 2px dashed rgba(255, 255, 255, 0.3);
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      transition: all 0.3s;
      cursor: pointer;
    }
    .upload-area:hover {
      border-color: #e50914;
      background: rgba(229, 9, 20, 0.1);
    }
    .upload-area.dragover {
      border-color: #e50914;
      background: rgba(229, 9, 20, 0.2);
    }
    .preview-container {
      margin-top: 24px;
      display: none;
    }
    .preview-img {
      max-width: 100%;
      max-height: 400px;
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
    }
    .btn-primary {
      background: #e50914;
      color: white;
    }
    .btn-primary:hover {
      background: #f40612;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(229, 9, 20, 0.3);
    }
    .btn-secondary {
      background: rgba(109, 109, 110, 0.7);
      color: white;
    }
    .btn-secondary:hover {
      background: rgba(109, 109, 110, 0.9);
    }
    .btn-outline {
      background: transparent;
      border: 2px solid white;
      color: white;
    }
    .btn-outline:hover {
      background: white;
      color: #1a1a2e;
    }
    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      flex-wrap: wrap;
    }
    .status {
      padding: 12px 16px;
      border-radius: 8px;
      margin-top: 16px;
      display: none;
    }
    .status.success {
      background: rgba(76, 175, 80, 0.2);
      border: 1px solid #4CAF50;
      color: #4CAF50;
    }
    .status.error {
      background: rgba(244, 67, 54, 0.2);
      border: 1px solid #f44336;
      color: #f44336;
    }
    .status.info {
      background: rgba(33, 150, 243, 0.2);
      border: 1px solid #2196F3;
      color: #2196F3;
    }
    .current-bg {
      margin-top: 16px;
    }
    .current-bg img {
      max-width: 100%;
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #b3b3b3;
      text-decoration: none;
      margin-bottom: 24px;
      transition: color 0.3s;
    }
    .back-link:hover {
      color: #e50914;
    }
    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    .instructions {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      padding: 16px;
      margin-top: 24px;
    }
    .instructions ol {
      padding-left: 20px;
    }
    .instructions li {
      margin-bottom: 8px;
      color: #b3b3b3;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← 返回首页</a>
    
    <h1>🎨 背景图片设置工具</h1>
    
    <!-- 当前背景 -->
    <div class="section">
      <h2>📷 当前背景</h2>
      <p>当前网站使用的背景图片</p>
      <div class="current-bg" id="currentBg">
        <p style="color: #666;">加载中...</p>
      </div>
    </div>
    
    <!-- 上传新背景 -->
    <div class="section">
      <h2>📤 上传新背景</h2>
      <p>选择或拖拽图片文件到下方区域（支持 JPG、PNG、WebP 格式，最大 5MB）</p>
      
      <div class="upload-area" id="uploadArea" role="button" tabindex="0" aria-label="点击选择图片文件或拖拽图片到此处">
        <p style="font-size: 24px; margin-bottom: 16px;" aria-hidden="true">📁</p>
        <p style="color: #b3b3b3;">点击选择文件或拖拽图片到这里</p>
        <label for="fileInput" class="visually-hidden">选择背景图片文件</label>
        <input type="file" id="fileInput" accept="image/*" style="display: none;" aria-label="背景图片文件选择">
      </div>
      
      <div class="preview-container" id="previewContainer">
        <p style="margin-bottom: 12px; color: #b3b3b3;">预览：</p>
        <img id="previewImg" class="preview-img" alt="背景预览">
      </div>
      
      <div class="button-group" role="group" aria-label="背景操作按钮">
        <button class="btn btn-primary" id="applyBtn" disabled aria-label="应用选中的背景图片">✨ 应用此背景</button>
        <button class="btn btn-secondary" id="resetBtn" aria-label="恢复默认渐变背景">🔄 恢复默认</button>
        <button class="btn btn-outline" id="clearBtn" aria-label="清除当前背景图片">🗑️ 清除背景</button>
      </div>
      
      <div class="status" id="status" role="status" aria-live="polite"></div>
    </div>
    
    <!-- 使用说明 -->
    <div class="section" aria-labelledby="instructions-heading">
      <h2 id="instructions-heading">📖 使用说明</h2>
      <div class="instructions">
        <ol>
          <li>选择一张高质量的图片（推荐 1920x1080 或更高）</li>
          <li>点击"应用此背景"按钮</li>
          <li>背景会自动保存到浏览器本地存储</li>
          <li>刷新网站页面即可看到新背景</li>
          <li>可以随时更换或恢复默认背景</li>
        </ol>
      </div>
    </div>
    
    <!-- 快速设置 -->
    <div class="section" aria-labelledby="quick-setup-heading">
      <h2 id="quick-setup-heading">⚡ 快速设置</h2>
      <p>直接设置默认背景图片路径</p>
      <div class="button-group" role="group" aria-label="快速设置按钮">
        <button class="btn btn-primary" onclick="setDefaultBg()" aria-label="将当前图片设置为网站默认背景">🎬 设置为默认背景</button>
        <button class="btn btn-secondary" onclick="openSettings()" aria-label="打开设置页面">⚙️ 打开设置页面</button>
      </div>
    </div>
  </div>

  <script>
    // XSS protection
    function escapeHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // DOM元素
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const previewContainer = document.getElementById('previewContainer');
    const previewImg = document.getElementById('previewImg');
    const applyBtn = document.getElementById('applyBtn');
    const resetBtn = document.getElementById('resetBtn');
    const clearBtn = document.getElementById('clearBtn');
    const status = document.getElementById('status');
    const currentBg = document.getElementById('currentBg');
    
    // 当前选中的文件
    let selectedFile = null;
    
    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
      loadCurrentBackground();
      setupEventListeners();
    });
    
    // 加载当前背景
    function loadCurrentBackground() {
      const savedBg = localStorage.getItem('customBackground');
      if (savedBg) {
        currentBg.innerHTML = `<img src="${escapeHtml(savedBg)}" alt="当前背景">`;
      } else {
        currentBg.innerHTML = `
          <div style="width: 100%; height: 200px; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #666;">
            使用默认渐变背景
          </div>
        `;
      }
    }
    
    // 设置事件监听器
    function setupEventListeners() {
      // 点击上传区域
      uploadArea.addEventListener('click', () => fileInput.click());
      
      // 文件选择
      fileInput.addEventListener('change', (e) => {
        handleFile(e.target.files[0]);
      });
      
      // 拖拽上传
      uploadArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadArea.classList.add('dragover');
      });
      
      uploadArea.addEventListener('dragleave', () => {
        uploadArea.classList.remove('dragover');
      });
      
      uploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadArea.classList.remove('dragover');
        handleFile(e.dataTransfer.files[0]);
      });
      
      // 应用按钮
      applyBtn.addEventListener('click', applyBackground);
      
      // 重置按钮
      resetBtn.addEventListener('click', resetBackground);
      
      // 清除按钮
      clearBtn.addEventListener('click', clearBackground);
    }
    
    // 处理文件
    function handleFile(file) {
      if (!file) return;
      
      if (!file.type.startsWith('image/')) {
        showStatus('请选择图片文件', 'error');
        return;
      }
      
      if (file.size > 5 * 1024 * 1024) {
        showStatus('图片文件过大，请选择小于5MB的图片', 'error');
        return;
      }
      
      selectedFile = file;
      
      // 显示预览
      const reader = new FileReader();
      reader.onload = (e) => {
        previewImg.src = e.target.result;
        previewContainer.style.display = 'block';
        applyBtn.disabled = false;
        showStatus('图片已选择，点击"应用此背景"按钮应用', 'info');
      };
      reader.readAsDataURL(file);
    }
    
    // 应用背景
    function applyBackground() {
      if (!selectedFile) {
        showStatus('请先选择图片文件', 'error');
        return;
      }
      
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          // 保存到本地存储
          localStorage.setItem('customBackground', e.target.result);
          
          // 更新当前背景显示
          loadCurrentBackground();
          
          // 应用到页面
          document.body.style.backgroundImage = `url(${e.target.result})`;
          
          showStatus('✅ 背景图片应用成功！刷新网站首页即可看到效果。', 'success');
          
          // 清除选择
          selectedFile = null;
          fileInput.value = '';
          previewContainer.style.display = 'none';
          applyBtn.disabled = true;
        } catch (error) {
          showStatus('❌ 应用失败: ' + error.message, 'error');
        }
      };
      reader.readAsDataURL(selectedFile);
    }
    
    // 重置背景
    function resetBackground() {
      localStorage.removeItem('customBackground');
      document.body.style.backgroundImage = 'linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)';
      loadCurrentBackground();
      showStatus('✅ 已恢复默认渐变背景', 'success');
    }
    
    // 清除背景
    function clearBackground() {
      localStorage.removeItem('customBackground');
      document.body.style.backgroundImage = 'none';
      document.body.style.backgroundColor = '#1a1a2e';
      loadCurrentBackground();
      showStatus('✅ 背景已清除，使用纯色背景', 'success');
    }
    
    // 显示状态消息
    function showStatus(message, type) {
      status.textContent = message;
      status.className = `status ${type}`;
      status.style.display = 'block';
      
      if (type === 'success') {
        setTimeout(() => {
          status.style.display = 'none';
        }, 5000);
      }
    }
    
    // 快速设置默认背景
    function setDefaultBg() {
      // 这里可以设置一个默认的背景图片URL
      // 由于我们无法直接访问用户的图片，这里提供一个占位方案
      showStatus('ℹ️ 请先上传您的背景图片，或直接将图片保存为 default-bg.jpg 到 /images/ 目录', 'info');
    }
    
    // 打开设置页面
    function openSettings() {
      window.location.href = '/setting.html';
    }
  </script>
</body>
</html>
