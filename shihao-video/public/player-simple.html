<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>播放测试</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7"></script>
  <style>
    body { margin: 0; background: #000; color: #fff; font-family: sans-serif; }
    #log { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 10px; font-size: 12px; max-width: 90%; z-index: 1000; }
    #video { width: 100vw; height: 100vh; }
    .error { color: #ff4444; }
    .success { color: #44ff44; }
  </style>
</head>
<body>
  <div id="log">初始化中...</div>
  <video id="video" controls></video>
  
  <script>
    const logEl = document.getElementById('log');
    const video = document.getElementById('video');
    
    function log(msg, type = '') {
      const p = document.createElement('div');
      p.className = type;
      p.textContent = msg;
      logEl.appendChild(p);
      console.log(msg);
    }
    
    // 获取URL参数
    const params = new URLSearchParams(window.location.search);
    const url = params.get('url');
    
    log('页面加载完成');
    log('URL: ' + url);
    log('Hls.js: ' + (typeof Hls !== 'undefined' ? '已加载' : '未加载'));
    
    if (typeof Hls === 'undefined') {
      log('Hls.js加载失败', 'error');
    } else if (!Hls.isSupported()) {
      log('浏览器不支持HLS', 'error');
    } else if (!url) {
      log('缺少视频URL参数', 'error');
    } else {
      log('开始加载视频...', 'success');
      
      const hls = new Hls();
      
      hls.on(Hls.Events.MANIFEST_PARSED, (event, data) => {
        log('✓ 加载成功！画质数: ' + data.levels.length, 'success');
        video.play().then(() => {
          log('✓ 开始播放', 'success');
        }).catch(e => {
          log('播放需要用户点击: ' + e.message, 'error');
        });
      });
      
      hls.on(Hls.Events.ERROR, (event, data) => {
        log('✗ 错误: ' + data.type + ' - ' + data.details, 'error');
      });
      
      hls.loadSource(url);
      hls.attachMedia(video);
    }
  </script>
</body>
</html>
