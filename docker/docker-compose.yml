version: '3.8'

services:
  ultrawork:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ultrawork-ai
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - TZ=Asia/Shanghai
    volumes:
      - ../.opencode:/app/.opencode
      - ultrawork-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ultrawork-network

  # Optional: Redis for caching (uncomment if needed)
  # redis:
  #   image: redis:7-alpine
  #   container_name: ultrawork-redis
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis-data:/data
  #   restart: unless-stopped
  #   networks:
  #     - ultrawork-network

  # Nginx reverse proxy (optional)
  # nginx:
  #   image: nginx:alpine
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #   depends_on:
  #     - ultrawork
  #   networks:
  #     - ultrawork-network

volumes:
  ultrawork-logs:
  # redis-data:

networks:
  ultrawork-network:
    driver: bridge
