apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ultrawork.fullname" . }}-secrets
type: Opaque
stringData:
  {{- if .Values.security.apiKey }}
  api-key: {{ .Values.security.apiKey }}
  {{- end }}
  {{- if .Values.redis.auth.enabled }}
  redis-password: {{ .Values.redis.auth.password }}
  {{- end }}
---
{{- if .Values.monitoring.enabled }}
{{- if .Values.monitoring.prometheus.enabled }}
{{- if .Values.monitoring.prometheus.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "ultrawork.fullname" . }}
  labels:
    {{- include "ultrawork.labels" . | nindent 4 }}
    release: prometheus
spec:
  selector:
    matchLabels:
      {{- include "ultrawork.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
{{- end }}
{{- end }}
{{- end }}
