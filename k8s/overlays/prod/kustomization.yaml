apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ultrawork

resources:
  - ../../base

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: ultrawork
      spec:
        replicas: 3
        template:
          spec:
            containers:
              - name: ultrawork
                resources:
                  limits:
                    memory: "2Gi"
                    cpu: "2"
                  requests:
                    memory: "1Gi"
                    cpu: "1"
                env:
                  - name: NODE_ENV
                    value: "production"
                  - name: PORT
                    value: "3000"
    target:
      kind: Deployment
      name: ultrawork

  - patch: |-
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: ultrawork-hpa
      spec:
        minReplicas: 3
        maxReplicas: 15
        metrics:
          - type: Resource
            resource:
              name: cpu
              target:
                type: Utilization
                averageUtilization: 60
          - type: Resource
            resource:
              name: memory
              target:
                type: Utilization
                averageUtilization: 70
    target:
      kind: HorizontalPodAutoscaler
      name: ultrawork-hpa

commonLabels:
  environment: production
