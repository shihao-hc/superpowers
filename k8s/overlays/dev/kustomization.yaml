apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ultrawork-dev

resources:
  - ../../base

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: ultrawork
      spec:
        replicas: 1
        template:
          spec:
            containers:
              - name: ultrawork
                resources:
                  limits:
                    memory: "512Mi"
                    cpu: "1"
                  requests:
                    memory: "256Mi"
                    cpu: "250m"
                env:
                  - name: NODE_ENV
                    value: "development"
                  - name: PORT
                    value: "3000"
                  - name: DEBUG
                    value: "true"
    target:
      kind: Deployment
      name: ultrawork

  - patch: |-
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: ultrawork-hpa
      spec:
        minReplicas: 1
        maxReplicas: 2
    target:
      kind: HorizontalPodAutoscaler
      name: ultrawork-hpa

commonLabels:
  environment: dev
