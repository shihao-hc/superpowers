# TradingAgents-CN Demo Environment
# 演示环境配置 - 包含 Ollama + Tavily + Mock LLM

version: '3.8'

services:
  # TradingAgents-CN API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-mock}
      - USE_MOCK_LLM=true
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - OLLAMA_BASE_URL=http://ollama:11434
      - ENABLE_METRICS=true
      - ENABLE_AUDIT_LOG=true
      - LOG_LEVEL=INFO
      - REDIS_URL=redis://redis:6379
      - MONGODB_URL=mongodb://mongo:27017
    depends_on:
      - redis
      - mongo
      - ollama
    networks:
      - demo-network
    restart: unless-stopped

  # Ollama (本地模型)
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - demo-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  # Redis (缓存)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - demo-network
    restart: unless-stopped

  # MongoDB (审计日志)
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - demo-network
    restart: unless-stopped

  # Vue Frontend
  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "3000:5173"
    volumes:
      - ./frontend:/app
    environment:
      - VITE_API_URL=http://api:8000
      - VITE_WS_URL=ws://localhost:8000
    depends_on:
      - api
    networks:
      - demo-network
    restart: unless-stopped

  # Prometheus (监控)
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - demo-network
    restart: unless-stopped

  # Grafana (仪表盘)
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - demo-network
    restart: unless-stopped

networks:
  demo-network:
    driver: bridge

volumes:
  ollama-data:
  redis-data:
  mongo-data:
  prometheus-data:
  grafana-data:
