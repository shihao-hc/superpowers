apiVersion: v1
kind: ConfigMap
metadata:
  name: tradingagents-config
  namespace: default
data:
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  LOG_LEVEL: "INFO"
  CACHE_TTL: "3600"
  MAX_DEBATE_ROUNDS: "2"
---
apiVersion: v1
kind: Secret
metadata:
  name: tradingagents-secrets
type: Opaque
stringData:
  OPENAI_API_KEY: "${OPENAI_API_KEY}"
  DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY}"
  DASHSCOPE_API_KEY: "${DASHSCOPE_API_KEY}"
  REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tradingagents-api
  labels:
    app: tradingagents-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tradingagents-api
  template:
    metadata:
      labels:
        app: tradingagents-api
    spec:
      containers:
        - name: api
          image: tradingagents-cn:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: tradingagents-config
            - secretRef:
                name: tradingagents-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: tradingagents-api
spec:
  selector:
    app: tradingagents-api
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tradingagents-api
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - api.tradingagents.example.com
      secretName: tradingagents-tls
  rules:
    - host: api.tradingagents.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tradingagents-api
                port:
                  number: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tradingagents-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tradingagents-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
