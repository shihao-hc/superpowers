apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tradingagents-cn.fullname" . }}-secrets
  labels:
    {{- include "tradingagents-cn.labels" . | nindent 4 }}
type: Opaque
stringData:
  deepseek-api-key: {{ .Values.api.secretEnv | where -eq "name" "DEEPSEEK_API_KEY" | first | .value | default "REPLACE_WITH_YOUR_KEY" }}
  dashscope-api-key: {{ .Values.api.secretEnv | where -eq "name" "DASHSCOPE_API_KEY" | first | .value | default "REPLACE_WITH_YOUR_KEY" }}
