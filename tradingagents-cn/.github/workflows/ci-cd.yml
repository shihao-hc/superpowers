name: CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ${{ github.repository }}-backend
  IMAGE_NAME_FRONTEND: ${{ github.repository }}-frontend

jobs:
  # 通知任务 (在所有主要任务完成后运行)
  notify:
    name: Notifications
    runs-on: ubuntu-latest
    needs: [test, e2e-test, lint, build-and-push, deploy-staging, deploy-production]
    if: always()
    steps:
      - name: Prepare notification data
        id: prepare
        run: |
          echo "TEST_STATUS=${{ needs.test.result }}" >> $GITHUB_OUTPUT
          echo "E2E_STATUS=${{ needs.e2e-test.result }}" >> $GITHUB_OUTPUT
          echo "LINT_STATUS=${{ needs.lint.result }}" >> $GITHUB_OUTPUT
          echo "BUILD_STATUS=${{ needs.build-and-push.result }}" >> $GITHUB_OUTPUT
          echo "DEPLOY_STAGING_STATUS=${{ needs.deploy-staging.result }}" >> $GITHUB_OUTPUT
          echo "DEPLOY_PRODUCTION_STATUS=${{ needs.deploy-production.result }}" >> $GITHUB_OUTPUT
          
          # 计算整体状态
          if [[ "${{ needs.test.result }}" == "success" ]] && [[ "${{ needs.lint.result }}" != "failure" ]] && [[ "${{ needs.build-and-push.result }}" != "failure" ]]; then
            echo "OVERALL_STATUS=success" >> $GITHUB_OUTPUT
          else
            echo "OVERALL_STATUS=failure" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack Notification
        if: env.SLACK_WEBHOOK != ''
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "TradingAgents-CN CI/CD Pipeline - ${{ steps.prepare.outputs.OVERALL_STATUS }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "TradingAgents-CN CI/CD Pipeline ${{ steps.prepare.outputs.OVERALL_STATUS == 'success' && '✅ Success' || '❌ Failed' }}"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {"type": "mrkdwn", "text": "*Commit:*\n${{ github.sha }}"},
                    {"type": "mrkdwn", "text": "*Branch:*\n${{ github.ref_name }}"},
                    {"type": "mrkdwn", "text": "*Author:*\n${{ github.actor }}"},
                    {"type": "mrkdwn", "text": "*Test:*\n${{ needs.test.result }}"},
                    {"type": "mrkdwn", "text": "*E2E:*\n${{ needs.e2e-test.result }}"},
                    {"type": "mrkdwn", "text": "*Lint:*\n${{ needs.lint.result }}"},
                    {"type": "mrkdwn", "text": "*Build:*\n${{ needs.build-and-push.result }}"}
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {"type": "plain_text", "text": "View Workflow"},
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Send DingTalk Notification
        if: env.DINGTALK_WEBHOOK != ''
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B | head -n 1)
          STATUS="${{ steps.prepare.outputs.OVERALL_STATUS }}"
          if [ "$STATUS" == "success" ]; then
            EMOJI="✅"
          else
            EMOJI="❌"
          fi
          
          PAYLOAD=$(cat <<EOF
          {
            "msgtype": "markdown",
            "markdown": {
              "title": "TradingAgents-CN CI/CD $STATUS",
              "text": "## $EMOJI TradingAgents-CN CI/CD $STATUS\n\n**Commit:** \`${{ github.sha }}\`\n\n**Branch:** ${{ github.ref_name }}\n\n**Author:** ${{ github.actor }}\n\n**结果:**\n- Test: ${{ needs.test.result }}\n- Lint: ${{ needs.lint.result }}\n- Build: ${{ needs.build-and-push.result }}\n- Deploy Staging: ${{ needs.deploy-staging.result }}\n- Deploy Production: ${{ needs.deploy-production.result }}\n\n[查看详情](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            }
          }
          EOF
          )
          
          curl -s -X POST "${{ secrets.DINGTALK_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}

      - name: Send WeChat Work Notification
        if: env.WECHAT_WEBHOOK != ''
        run: |
          STATUS="${{ steps.prepare.outputs.OVERALL_STATUS }}"
          if [ "$STATUS" == "success" ]; then
            EMOJI="✅"
          else
            EMOJI="❌"
          fi
          
          PAYLOAD=$(cat <<EOF
          {
            "msgtype": "markdown",
            "markdown": {
              "content": "## $EMOJI TradingAgents-CN CI/CD $STATUS\n\n**Commit:** \`${{ github.sha }}\`\n\n**Branch:** ${{ github.ref_name }}\n\n**结果:**\n- Test: ${{ needs.test.result }}\n- Lint: ${{ needs.lint.result }}\n- Build: ${{ needs.build-and-push.result }}"
            }
          }
          EOF
          )
          
          curl -s -X POST "${{ secrets.WECHAT_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
        env:
          WECHAT_WEBHOOK: ${{ secrets.WECHAT_WEBHOOK }}

      - name: Update Deployment Summary
        if: always()
        run: |
          echo "## CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Tests | ${{ needs.e2e-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build & Push | ${{ needs.build-and-push.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy Staging | ${{ needs.deploy-staging.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy Production | ${{ needs.deploy-production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY

  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      ollama:
        image: ollama/ollama:latest
        ports:
          - 11434:11434
        options: >-
          --name ollama
          --health-cmd "curl -f http://localhost:11434/api/tags || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx websockets

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Pull Ollama test model
        run: |
          echo "Waiting for Ollama to be ready..."
          until curl -s http://localhost:11434/api/tags > /dev/null 2>&1; do sleep 1; done
          echo "Ollama is ready, pulling tinyllama model..."
          curl -X POST http://localhost:11434/api/pull -d '{"name": "tinyllama"}'
          echo "Model pulled, verifying..."
          curl -s http://localhost:11434/api/tags | grep -q tinyllama && echo "Model verified!"

      - name: Cache Ollama models
        uses: actions/cache@v4
        with:
          path: ~/.ollama
          key: ollama-models-tinyllama
          restore-keys: |
            ollama-models-

      - name: Run backend unit tests
        env:
          MONGODB_URI: mongodb://localhost:27017
          REDIS_URL: redis://localhost:6379
          USE_MOCK_LLM: true
        run: |
          pytest tests/test_code_review.py -v --cov=tradingagents --cov-report=xml --cov-report=term --cov-fail-under=50

      - name: Run mock integration tests
        env:
          MONGODB_URI: mongodb://localhost:27017
          REDIS_URL: redis://localhost:6379
          USE_MOCK_LLM: true
        run: |
          pytest tests/integration/test_ollama_adapter.py tests/integration/test_tavily_search.py -v --cov=tradingagents --cov-report=xml --cov-report=term

      - name: Run Ollama real integration tests
        env:
          OLLAMA_BASE_URL: http://localhost:11434
          OLLAMA_MODEL: tinyllama
          USE_MOCK_LLM: false
        run: |
          pytest tests/integration/test_ollama_tavily.py::TestOllamaRealEnvironment -v

      - name: Run Tavily integration tests
        if: env.TAVILY_API_KEY != ''
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          pytest tests/integration/test_ollama_tavily.py::TestTavilyRealEnvironment -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint || true

  e2e-test:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      ollama:
        image: ollama/ollama:latest
        ports:
          - 11434:11434

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install backend dependencies
        run: |
          pip install -r requirements.txt
          pip install uvicorn

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Pull Ollama test model
        run: |
          echo "Waiting for Ollama to be ready..."
          until curl -s http://localhost:11434/api/tags > /dev/null 2>&1; do sleep 1; done
          echo "Ollama is ready, pulling tinyllama model..."
          curl -X POST http://localhost:11434/api/pull -d '{"name": "tinyllama"}'

      - name: Cache Ollama models
        uses: actions/cache@v4
        with:
          path: ~/.ollama
          key: ollama-models-e2e-${{ github.run_id }}
          restore-keys: |
            ollama-models-

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start backend server
        run: |
          uvicorn tradingagents.api.app:app --host 0.0.0.0 --port 8000 &
          sleep 5

      - name: Start frontend dev server
        working-directory: frontend
        run: npm run dev -- --host 0.0.0.0 --port 5173 &
        env:
          VITE_API_URL: http://localhost:8000
          VITE_WS_URL: ws://localhost:8000

      - name: Run E2E tests
        working-directory: frontend
        run: npx playwright test --reporter=html
        env:
          BASE_URL: http://localhost:5173

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/test-results/
          retention-days: 7

  lint:
    name: Lint & Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install linting tools
        run: |
          pip install flake8 bandit mypy pylint black isort

      - name: Run flake8 (critical errors only)
        run: |
          flake8 tradingagents --count --select=E9,F63,F7,F82 --show-source --statistics
        continue-on-error: true

      - name: Run bandit security scan
        run: |
          bandit -r tradingagents -f json -o bandit-report.json || true
        continue-on-error: true

      - name: Run mypy type check
        run: |
          mypy tradingagents --ignore-missing-imports --follow-imports=skip || true
        continue-on-error: true

  build-and-push:
    name: Build and Push Docker Images
    needs: [test, lint]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image build summary
        run: |
          echo "## Docker Images Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: \`${{ steps.meta-backend.outputs.tags }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: \`${{ steps.meta-frontend.outputs.tags }}\`" >> $GITHUB_STEP_SUMMARY

  deploy-staging:
    name: Deploy to Staging
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > $HOME/.kube/config

      - name: Deploy with Helm
        run: |
          helm upgrade --install tradingagents-cn ./k8s/helm \
            --set backend.image.tag=develop-${{ github.sha }} \
            --set frontend.image.tag=develop-${{ github.sha }} \
            --set backend.image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }} \
            --set frontend.image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }} \
            --namespace tradingagents-staging \
            --create-namespace \
            --timeout 5m

  deploy-production:
    name: Deploy to Production
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > $HOME/.kube/config

      - name: Deploy with Helm
        run: |
          helm upgrade --install tradingagents-cn ./k8s/helm \
            --set backend.image.tag=main-${{ github.sha }} \
            --set frontend.image.tag=main-${{ github.sha }} \
            --set backend.image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }} \
            --set frontend.image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }} \
            --namespace tradingagents \
            --create-namespace \
            --timeout 10m

      - name: Notify deployment
        if: always()
        run: |
          echo "## Deployment Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Job: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "Ref: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
