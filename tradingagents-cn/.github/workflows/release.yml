name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Generate changelog
        id: changelog
        run: |
          CHANGELOG=$(git log --oneline --pretty='%h %s' ${{ github.event.before }}..HEAD | head -20)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## Changelog

            ${{ steps.changelog.outputs.changelog }}

            ## What's Changed

            See [full changelog](https://github.com/${{ github.repository }}/compare/${{ github.event.before }}...${{ github.ref_name }})

            ## Docker Images

            - Backend: `ghcr.io/${{ github.repository_lower }}/backend:${{ github.ref_name }}`
            - Frontend: `ghcr.io/${{ github.repository_lower }}/frontend:${{ github.ref_name }}`
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-push:
    name: Build & Push (${{ matrix.component }})
    runs-on: ubuntu-latest
    needs: [release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: backend
            dockerfile: ./Dockerfile
            context: .
            image: ghcr.io/${{ github.repository_lower }}/backend
          - component: frontend
            dockerfile: ./frontend/Dockerfile
            context: ./frontend
            image: ghcr.io/${{ github.repository_lower }}/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  promote:
    name: Update Latest Tag
    runs-on: ubuntu-latest
    needs: [build-and-push]
    steps:
      - name: Update latest tag
        run: |
          echo "::notice title=Release Complete::"
          echo "Version ${{ needs.release.outputs.version }} has been released!"
          echo ""
          echo "Docker Images:"
          echo "  - ghcr.io/${{ github.repository_lower }}/backend:${{ github.ref_name }}"
          echo "  - ghcr.io/${{ github.repository_lower }}/frontend:${{ github.ref_name }}"
