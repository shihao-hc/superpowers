global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: 'webhook'
  routes:
    - match:
        severity: critical
      receiver: 'critical-webhook'
      continue: true
    - match:
        severity: warning
      receiver: 'webhook'

receivers:
  - name: 'webhook'
    webhook_configs:
      - url: 'http://api:8000/api/v1/alerts/webhook'
        send_resolved: true

  - name: 'critical-webhook'
    webhook_configs:
      - url: 'http://api:8000/api/v1/alerts/webhook'
        send_resolved: true
        headers:
          Content-Type: application/json

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
