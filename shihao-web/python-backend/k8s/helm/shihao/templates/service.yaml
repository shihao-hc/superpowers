apiVersion: v1
kind: Service
metadata:
  name: {{ include "shihao.fullname" . }}
  labels:
    {{- include "shihao.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      name: http
      protocol: TCP
    - port: {{ .Values.service.metricsPort }}
      targetPort: metrics
      name: metrics
      protocol: TCP
  selector:
    {{- include "shihao.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "shihao.serviceAccountName" . }}
  labels:
    {{- include "shihao.labels" . | nindent 4 }}