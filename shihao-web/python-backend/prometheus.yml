global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'shihao-agent'
    static_configs:
      - targets: ['shihao-agent:8000']
    metrics_path: '/metrics'

  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []