version: '3.8'
services:
  # Python Backend (New Architecture)
  python-backend:
    build: 
      context: ./python-backend
      dockerfile: Dockerfile
    ports:
      - '8000:8000'
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./python-backend:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
  
  # Node.js Backend (Legacy/Compatibility)
  node-backend:
    build: ./backend
    ports:
      - '4000:4000'
    restart: unless-stopped
    profiles:
      - legacy
  
  # Frontend
  frontend:
    image: nginx:stable-alpine
    ports:
      - '3000:80'
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    depends_on:
      - python-backend
