name: ShiHao CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: shihao-web/frontend
        run: npm ci

      - name: Build frontend
        working-directory: shihao-web/frontend
        run: npm run build

      - name: Install backend dependencies
        working-directory: shihao-web/backend
        run: npm ci

      - name: Run backend tests (smoke)
        run: npm --prefix backend test
        shell: bash
      - name: Run Python tests
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          pytest -q || echo 'No Python tests'
      - name: Run backend additional endpoint tests
        run: node D:\龙虾\shihao-web\backend/test/api_endpoints_more.js
        shell: bash
      - name: Run backend run-times endpoint test
        run: node D:\龙虾\shihao-web\backend/test/api_run_times_http.js
      - name: Run aggregate summary test
        run: node D:\龙虾\shihao-web\backend/test/api_aggregate_summary.js
        shell: bash
