apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-platform-edge
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ai-platform-edge
  template:
    metadata:
      labels:
        app: ai-platform-edge
    spec:
      containers:
        - name: ai-platform-edge
          image: ai-platform-edge:latest
          ports:
            - containerPort: 3000
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 5
